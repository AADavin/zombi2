site_name: ZOMBI2
site_description: Simulating the evolution of species trees, genomes, sequences and traits
site_url: https://aadavin.github.io/zombi2/docs/
repo_url: https://github.com/AADavin/zombi2
repo_name: AADavin/zombi2
docs_dir: docs
# Never publish LaTeX/BibTeX source (e.g. coupling_explained.tex) — MkDocs would
# otherwise copy them verbatim into the built site and serve them publicly.
exclude_docs: |
  *.tex
  *.bib
  # design/ holds SPEC.md — a repo reference (see CLAUDE.md),
  # not a published site page; keep it out of the build.
  design/

# The header title/logo links back to the main website (these docs are a /docs/ subsite).
extra:
  homepage: https://aadavin.github.io/zombi2/

theme:
  name: material
  features:
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    # Light mode — the default, shown when the visitor's OS prefers light.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode — shown when the visitor's OS prefers dark; header toggle flips it.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# TEMPORARY — until the chapter figures are wired into the site.
# The chapters reference their figures as `figures/<name>_print.png`: the flattened raster the PDF
# build generates from `manual/book/figures/<name>.svg` and never commits, so nothing under that
# path exists for MkDocs to serve. Under `--strict` each one is a build-breaking warning. Left at
# `info` the text of every chapter publishes now and the figures follow in their own commit, which
# should point the chapters at the tracked, theme-aware `.svg` (it honours the site's dark mode)
# and teach the PDF build to swap in the raster. Restore the default then.
# The guard that matters is untouched: a renamed chapter still fails the build, because the
# snippets plugin checks its own include paths (`check_paths: true` below).
validation:
  links:
    not_found: info

# The chapters are written for pandoc, whose callouts are fenced divs (`::: note`). MkDocs has no
# such syntax and mkdocstrings claims every `::: identifier` line, so this rewrites the book's
# callouts to admonitions before they get that far. See the module docstring.
# Chapter figures name the book's print raster, which is a build artefact; this points them back at
# the authored SVG in docs/img/. See the module docstring.
hooks:
  - hooks/manual_callouts.py
  - hooks/manual_figures.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  # The chapters set their display formulas as TeX ($$…$$) so they typeset in both outputs — as
  # display math in the PDF, and here via MathJax (see javascripts/mathjax.js).
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  # Lets docs pages pull in manual/book chapters (single source of truth).
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

# The site IS the manual: every page under Guide and Reference is a snippet include of the
# corresponding file in manual/book/, so the book and the site cannot drift. The order below is
# the book's reading order. Adding a chapter means adding a stub page and a line here.
nav:
  - Home: index.md
  - Guide:
      - Introduction: guide/introduction.md
      - A tour of ZOMBI2: guide/tour.md
      - Species trees: guide/species-trees.md
      - "Genomes I: unordered": guide/genomes.md
      - "Genomes II: ordered": guide/genomes-ordered.md
      - "Genomes III: nucleotide": guide/genomes-nucleotide.md
      - Sequence evolution: guide/sequences.md
      - Trait evolution: guide/traits.md
      - Conditioning and joining: guide/conditioning-and-joining.md
  - Reference:
      - API reference: reference/api.md
      - Rates and the Gillespie algorithm: reference/rates-and-gillespie.md
      - Output files: reference/output-files.md
      - Tools: reference/tools.md
