site_name: ZOMBI2
site_description: Simulation of species trees and gene families in phylogenetics
site_url: https://aadavin.github.io/zombi2/docs/
repo_url: https://github.com/AADavin/zombi2
repo_name: AADavin/zombi2
docs_dir: docs
# Never publish LaTeX/BibTeX source (e.g. coupling_explained.tex) — MkDocs would
# otherwise copy them verbatim into the built site and serve them publicly.
exclude_docs: |
  *.tex
  *.bib

# The header title/logo links back to the main website (these docs are a /docs/ subsite).
extra:
  homepage: https://aadavin.github.io/zombi2/

theme:
  name: material
  features:
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    # Light mode — the default, shown when the visitor's OS prefers light.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode — shown when the visitor's OS prefers dark; header toggle flips it.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  # Lets docs/changelog.md pull in the repo-root CHANGELOG.md (single source of truth).
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

nav:
  - Home: index.md
  - Get started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Parameters files: parameters-file.md
  - Guide:
      - Species trees: guide/species-trees.md
      - Genomes: guide/genomes.md
      - Traits: guide/traits.md
      - Sequences: guide/sequences.md
      - Coevolution: guide/coevolution.md
      - Null models of coevolution: guide/coevolution_nulls.md
      - Rates: guide/rates.md
      - Running in parallel: guide/parallel.md
  - Cookbook:
      - cookbook/index.md
      - Inversion rate from synteny: cookbook/synteny.md
      - Can you trust RED?: cookbook/red-validation.md
      - Core-gene turnover rates: cookbook/universal-core-rates.md
  - Examples: examples.md
  - Experimental:
      - Incomplete lineage sorting: experimental/incomplete-lineage-sorting.md
  - Tools:
      - Overview: tools/index.md
      - Reconciliation likelihood: tools/reconciliation-likelihood.md
      - Undated simulation: tools/undated-simulation.md
      - Relative Evolutionary Divergence: tools/red.md
      - Tree distances: tools/treedist.md
      - Reconciliation accuracy: tools/recon-accuracy.md
      - Parsing reconciliation output: tools/reconciliation-parsing.md
      - Gene-order export: tools/geneorder-export.md
  - Reference:
      - Command line: cli.md
      - Python API: reference/api.md
      - The Rust engine: guide/rust-engine.md
  - About:
      - FAQ: faq.md
      - Comparison with ZOMBI 1: comparison.md
      - Validation: validation.md
      - References: references.md
      - Changelog: changelog.md
  - Contributing:
      - Overview: contributing.md
      - Adding a model: contributing/adding-a-model.md
      - Model lifecycle: contributing/model-lifecycle.md
      - Conventions: contributing/conventions.md
      - Publishing a release: publishing.md
