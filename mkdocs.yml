site_name: ZOMBI2
site_description: Simulation of species trees and gene families in phylogenetics
repo_url: https://github.com/AADavin/zombi2
repo_name: AADavin/zombi2
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: teal

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Command-line interface: cli.md
  - User guide:
      - Species trees: guide/species-trees.md
      - Ghost lineages: guide/ghost-lineages.md
      - Ghost lineages — how it works: ghost_lineages.md
      - Gene families & rates: guide/gene-families.md
      - Transfers: guide/transfers.md
      - Bounding growth: guide/growth.md
      - Gene trees & output: guide/gene-trees-and-output.md
      - Matching empirical profiles: guide/matching.md
      - Ordered genomes: guide/ordered-genomes.md
      - Rate variation: guide/rate-variation.md
      - Running in parallel: guide/parallel.md
      - Rust fast path: guide/rust-fast-path.md
      - Extending ZOMBI2: guide/extending.md
  - Cookbook: cookbook.md
  - FAQ: faq.md
  - Comparison with ZOMBI-1: comparison.md
  - Contributing: contributing.md
  - API reference: reference/api.md
  - Roadmap:
      - Species-tree models: species_tree_models.md
