site_name: ZOMBI2
site_description: Simulation of species trees and gene families in phylogenetics
site_url: https://aadavin.github.io/zombi2/docs/
repo_url: https://github.com/AADavin/zombi2
repo_name: AADavin/zombi2
docs_dir: docs
# Never publish LaTeX/BibTeX source (e.g. coupling_explained.tex) — MkDocs would
# otherwise copy them verbatim into the built site and serve them publicly.
exclude_docs: |
  *.tex
  *.bib
  # design/ holds SPEC.md, MAP.md and the api design docs — repo references (see CLAUDE.md),
  # not published site pages; keep them out of the build.
  design/

# The header title/logo links back to the main website (these docs are a /docs/ subsite).
extra:
  homepage: https://aadavin.github.io/zombi2/

theme:
  name: material
  features:
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    # Light mode — the default, shown when the visitor's OS prefers light.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode — shown when the visitor's OS prefers dark; header toggle flips it.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html
  # Lets docs/changelog.md pull in the repo-root CHANGELOG.md (single source of truth).
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

# The docs site is being rewritten on the clean core (see docs/design/MAP.md), growing a
# page as each level lands. The old pages are parked in legacy/docs/, out of the build.
nav:
  - Home: index.md
  - Guide:
      - Species trees: guide/species-trees.md
