<text x="40" y="40" font-size="20" font-family="Helvetica" text-anchor="start" font-weight="bold" fill="#1a1a1a">The clade-shift model — one clade switches to a new rate regime</text>
<text x="40" y="64" font-size="13" font-family="Helvetica" text-anchor="start" fill="#777">at a set age, a random lineage and all its descendants adopt new (birth, death) rates — here a burst of speciation.  ZOMBI2: CladeShiftBirthDeath(b, d, clade_shifts=[(age, b, d)])</text>
