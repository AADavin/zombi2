<text x="40" y="44" font-size="20" font-family="Helvetica" text-anchor="start" font-weight="bold" fill="#1a1a1a">The DEC model — geographic ranges evolve by dispersal, extinction &amp; cladogenesis</text>
<text x="40" y="68" font-size="13" font-family="Helvetica" text-anchor="start" fill="#777">a range is a set of areas (coloured cells); ZOMBI2: DEC(areas=['A','B','C'], dispersal=d, extinction=e)</text>
<text x="60" y="112" font-size="17" font-family="Helvetica" text-anchor="start" font-weight="bold" fill="#1a1a1a">Along a branch — dispersal &amp; extinction</text>
<text x="60" y="132" font-size="13" font-family="Helvetica" text-anchor="start" fill="#777">a Markov chain over ranges (subsets of areas)</text>
