<text x="40" y="44" font-size="21" font-family="Helvetica" text-anchor="start" font-weight="bold" fill="#1a1a1a">The Potts model — gene families that gain and lose together</text>
<text x="40" y="70" font-size="13.5" font-family="Helvetica" text-anchor="start" fill="#777">non-independent gene families: pairwise couplings J make partners co-occur (+) or avoid each other (−).  ZOMBI2: PottsRates / simulate_coupled</text>
