<text x="82" y="372" font-size="16" font-family="Helvetica" text-anchor="start" font-weight="bold" fill="#1a1a1a">Coupling enters through the LOSS rate</text>
<text x="96" y="404" font-size="14" font-family="Helvetica" text-anchor="start" fill="#1a1a1a">local field   f_i  =  h_i  +  Σ_j  J_ij · σ_j        (sum over present partners)</text>
<text x="96" y="430" font-size="14" font-family="Helvetica" text-anchor="start" fill="#1a1a1a">loss rate   loss_i  =  base_loss · e^(−β · f_i)</text>
