<text x="540.0" y="52" font-size="32" font-family="Helvetica" text-anchor="middle" font-weight="bold" fill="#1a1a1a">Couplings J tie families into modules</text>
<path d="M240.0,104 L278.0,104" stroke="#2f8f4e" stroke-width="4.5" />
<text x="288.0" y="104" font-size="18" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a">J &gt; 0  (partners co-occur)</text>
<path d="M600.0,104 L638.0,104" stroke="#cc4b3c" stroke-width="4.0" stroke-dasharray="9,6" />
<text x="648.0" y="104" font-size="18" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a">J &lt; 0  (partners avoid)</text>
