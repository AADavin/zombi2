<text x="310" y="460" font-size="22" font-family="Helvetica" text-anchor="middle" fill="#4477AA" font-weight="bold">module A</text>
<text x="860" y="460" font-size="22" font-family="Helvetica" text-anchor="middle" fill="#E08A3C" font-weight="bold">module B</text>
<text x="540.0" y="540" font-size="18" font-family="Helvetica" text-anchor="middle" fill="#8a8a8a">families are nodes, couplings are edges; mutually positive J form a module</text>
<text x="540.0" y="568" font-size="18" font-family="Helvetica" text-anchor="middle" fill="#8a8a8a">a weak J &lt; 0 between modules keeps them apart</text>
