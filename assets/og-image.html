<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; overflow: hidden; }
  body {
    background: #0b1413; color: #eef2ec;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    position: relative;
  }
  .phylo { position: absolute; right: -30px; top: 70px; width: 640px; height: 500px; opacity: .6; }
  .wrap {
    position: absolute; left: 100px; top: 0; height: 640px;
    display: flex; flex-direction: column; justify-content: center; max-width: 780px; z-index: 2;
  }
  .eyebrow { color: #34c6b3; font-size: 25px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; margin-bottom: 24px; }
  .word { font-size: 172px; font-weight: 800; letter-spacing: -.05em; line-height: .88; }
  .word .n { color: #34c6b3; }
  .tag { margin-top: 34px; font-size: 37px; line-height: 1.3; color: #b7c5be; font-weight: 400; max-width: 660px; }
  .row { margin-top: 48px; display: flex; align-items: center; gap: 28px; }
  .chip { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 29px; background: #07110f; border: 1px solid #223330; border-radius: 12px; padding: 15px 24px; color: #cfe6e1; }
  .chip .p { color: #34c6b3; }
  .url { font-size: 29px; color: #34c6b3; font-weight: 600; }
</style></head>
<body>
  <svg class="phylo" viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="460" y1="55" x2="460" y2="320" stroke="#3a4a44" stroke-width="1" stroke-dasharray="2 6"/>
    <path d="M40 185 H95 M95 120 V250 M95 120 H180 M180 85 V160 M180 85 H460 M180 160 H285 M285 130 V195 M285 130 H460 M95 250 H200 M200 215 V300 M200 215 H460"
          stroke="#34c6b3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="460" cy="85" r="4.5" fill="#34c6b3"/>
    <circle cx="460" cy="130" r="4.5" fill="#34c6b3"/>
    <circle cx="460" cy="215" r="4.5" fill="#34c6b3"/>
    <path d="M285 195 H395 M200 300 H330" stroke="#7f9184" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 5"/>
    <circle cx="395" cy="195" r="3.8" fill="#0b1413" stroke="#7f9184" stroke-width="1.6"/>
    <circle cx="330" cy="300" r="3.8" fill="#0b1413" stroke="#7f9184" stroke-width="1.6"/>
  </svg>
  <div class="wrap">
    <div class="eyebrow">Phylogenetic genome simulator</div>
    <div class="word">ZOMBI<span class="n">2</span></div>
    <div class="tag">Simulating genome and phylogenetic evolution.</div>
    <div class="row">
      <div class="chip"><span class="p">$</span> pip install zombi2</div>
      <div class="url">aadavin.github.io/zombi2</div>
    </div>
  </div>
</body></html>
