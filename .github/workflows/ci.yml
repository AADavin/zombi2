name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # The clean core is pure Python (numpy only) — a plain editable install, no build step.
      - name: Install ZOMBI2 (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run the test suite
        run: pytest -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Install the linter from the [dev] extra so it stays the single source of truth for its
      # pinned version — a contributor running `pip install -e ".[dev]"` lints with exactly what CI
      # does. The clean core is pure Python, so no toolchain beyond pip is needed.
      - name: Install ZOMBI2 (dev extra)
        run: pip install -e ".[dev]"

      # The active repo, not just zombi2/: the package, the tests, the figure scripts and the
      # analyses. legacy/ (the quarantined old codebase) is excluded in [tool.ruff]; other
      # exemptions live in [tool.ruff.lint.per-file-ignores] with their rationale.
      - name: Lint
        run: ruff check .

  docs:
    name: docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Install the docs toolchain from the [docs] extra so it stays the single
      # source of truth. The clean core is pure Python; the docs build only needs zombi2 importable.
      - name: Install ZOMBI2 (docs extra)
        run: pip install -e ".[docs]"

      - name: Build the documentation (strict)
        run: mkdocs build --strict

  # The RED benchmark (examples/red_benchmark) exercised zombi2.tools.red and the old CLI, now
  # quarantined in legacy/. Its CI job returns when the tools layer is rebuilt on the clean core.
