name: Release

# Builds and publishes the ZOMBI2 distribution:
#   * zombi2 -- the pure-Python package, a single wheel + sdist (hatchling).
#
# Publishing uses PyPI Trusted Publishing (OIDC) -- no stored API token. It is
# GATED so nothing goes out by accident:
#   * PyPI  -- only when a GitHub Release is published.
#   * TestPyPI -- only on a manual run with the `testpypi` box ticked.
# See docs/publishing.md for the one-time PyPI setup (a trusted publisher
# pointing at this workflow). Until that is configured the publish jobs fail
# safely at the OIDC step and nothing is uploaded.
#
# (The compiled Rust engine zombi2_core lived here too; it has been retired
# from the repository, so its build/publish jobs are gone. The clean core is
# pure Python and does not depend on it.)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish the built distributions to TestPyPI"
        type: boolean
        default: false

permissions: {}

jobs:
  zombi2-dist:
    name: zombi2 wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # zombi2 is pure Python (hatchling), so it builds without numpy or a
      # compiled engine -- those are runtime dependencies only.
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist .
      - uses: actions/upload-artifact@v4
        with:
          name: dist-zombi2
          path: dist/*

  # ---- publishing (gated, Trusted Publishing / OIDC) ---------------------

  publish-testpypi-zombi2:
    name: publish zombi2 to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.testpypi
    needs: [zombi2-dist]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-zombi2
          path: dist-zombi2
      - name: Publish zombi2
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-zombi2
          repository-url: https://test.pypi.org/legacy/
          attestations: false

  publish-pypi-zombi2:
    name: publish zombi2 to PyPI
    if: github.event_name == 'release'
    needs: [zombi2-dist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-zombi2
          path: dist-zombi2
      - name: Publish zombi2
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-zombi2

  # The PDF manual is no longer attached to releases: it is built and published once, at
  # /zombi2-manual.pdf on the site, by pages.yml (which tracks main). One living manual beats two
  # that can disagree — the release-pinned copy only moved on a release and drifted behind the book.
