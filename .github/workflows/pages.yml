name: Site

# Build the landing page (web/) at the site root, the MkDocs docs under /docs/, and the PDF manual
# at /zombi2-manual.pdf, then publish all three to GitHub Pages on every push to main.
# Pages source must be set to "GitHub Actions" (Settings -> Pages).
#
# The manual is built here and published at /zombi2-manual.pdf — the single, canonical PDF, so it
# always tracks main. This is the only place the manual is built: a release-attached copy used to
# exist too, but it only moved when a release was cut and drifted months behind the book, and one
# living manual is simpler than two URLs that can disagree.
on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Builds /zombi2-manual.pdf, the site's canonical manual — the only place the PDF is built now.
  manual:
    name: manual PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install XeLaTeX and librsvg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            librsvg2-bin lmodern \
            texlive-xetex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra texlive-plain-generic
      - name: Install a recent Pandoc (Ubuntu's apt pandoc is too old for --syntax-highlighting)
        run: |
          ver=$(curl -fsSL https://api.github.com/repos/jgm/pandoc/releases/latest | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p')
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${ver}/pandoc-${ver}-1-amd64.deb" -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1
      - name: Build the manual
        run: make -C manual manual
      - uses: actions/upload-artifact@v4
        with:
          name: zombi2-manual
          path: manual/build/zombi2-manual.pdf

  build:
    name: build site
    needs: manual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Install the docs toolchain from the [docs] extra (single source of truth).
      # zombi2_core resolves from PyPI as a prebuilt abi3 wheel; mkdocstrings only
      # needs zombi2 importable to render docstrings.
      - name: Install docs dependencies
        run: pip install -e ".[docs]"
      - name: Build the docs (strict) into /docs/
        run: mkdocs build --strict --site-dir _site/docs
      - name: Add the landing page at the site root
        run: cp -R web/. _site/
      - name: Add the manual PDF at the site root
        uses: actions/download-artifact@v4
        with:
          name: zombi2-manual
          path: _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
