name: Site

# Build the landing page (web/) at the site root and the MkDocs docs under
# /docs/, then publish both to GitHub Pages on every push to main.
# Pages source must be set to "GitHub Actions" (Settings -> Pages).
on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Install the docs toolchain from the [docs] extra (single source of truth).
      # zombi2_core resolves from PyPI as a prebuilt abi3 wheel; mkdocstrings only
      # needs zombi2 importable to render docstrings.
      - name: Install docs dependencies
        run: pip install -e ".[docs]"
      - name: Build the docs (strict) into /docs/
        run: mkdocs build --strict --site-dir _site/docs
      - name: Add the landing page at the site root
        run: cp -R web/. _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
