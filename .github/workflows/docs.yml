name: Docs

# Build the MkDocs site and publish it to GitHub Pages on every push to main.
# Pages source must be set to "GitHub Actions" (Settings -> Pages).
on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Mirror the CI docs job: mkdocstrings imports zombi2 (numpy only; the
      # compiled engine degrades gracefully and is not needed to render docs).
      - name: Install docs dependencies (engine-free)
        run: |
          pip install -e . --no-deps
          pip install "numpy>=1.24" mkdocs-material "mkdocstrings[python]"
      - name: Build the site (strict)
        run: mkdocs build --strict --site-dir _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
