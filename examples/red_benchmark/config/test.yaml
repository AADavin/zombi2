# Tiny RED-benchmark config for the CI smoke test / a quick local dry-run.
# Small trees, few replicates — runs in seconds, still exercises every rule and both figures.
trees:
  yule_n60: {model: yule, n_tips: 60, birth: 1.0, death: 0.0, seeds: [1]}

perturbations:
  strict:      {clock: strict}
  ratevar_0.5: {clock: ratevar, switch_rate: 0.5, spread: 5.5, n_bins: 15}

replicates: 2

showcase:
  tree: yule_n60
  perturbations: [strict, ratevar_0.5]
