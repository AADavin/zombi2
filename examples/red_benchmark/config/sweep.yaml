# RED node-age benchmark — parameter sweep configuration.
#
# The workflow: for every tree config × seed, simulate an ultrametric time tree (known ages);
# for every perturbation × replicate, perturb its branch rates and recover ages with RED; then
# aggregate into results/summary.tsv + figures. Everything here is data — edit freely.

# ------------------------------------------------------------------ tree configs
# Each is simulated once per seed and reused across all perturbations (the cheap DAG root).
# model: 'yule' (pure birth, ultrametric) or 'bd' (birth-death, pruned to the extant tree).
trees:
  yule_n200: {model: yule, n_tips: 200, birth: 1.0, death: 0.0, seeds: [1, 2, 3]}
  yule_n500: {model: yule, n_tips: 500, birth: 1.0, death: 0.0, seeds: [1, 2]}
  bd_n300:   {model: bd,   n_tips: 300, birth: 1.0, death: 0.4, seeds: [1, 2]}

# ------------------------------------------------------------------ perturbations
# clock: 'strict' | 'ratevar' (GTDB discrete-bin) | 'aln' | 'cir' | 'whitenoise' | 'ucln'.
# Remaining keys are that clock's parameters. 'strict' is the exact-recovery anchor (r = 1).
perturbations:
  strict:      {clock: strict}
  ratevar_0.1: {clock: ratevar, switch_rate: 0.1, spread: 5.5, n_bins: 15}
  ratevar_0.5: {clock: ratevar, switch_rate: 0.5, spread: 5.5, n_bins: 15}
  ratevar_1.0: {clock: ratevar, switch_rate: 1.0, spread: 5.5, n_bins: 15}
  aln_0.5:     {clock: aln, sigma: 0.5}
  aln_1.0:     {clock: aln, sigma: 1.0}
  cir_mid:     {clock: cir, theta: 1.0, sigma: 0.6}

replicates: 5          # independent clock realizations per (tree seed, perturbation)

# which (tree, perturbations) to render as the true-vs-recovered scatter figure
showcase:
  tree: yule_n200
  perturbations: [strict, ratevar_0.1, ratevar_0.5, ratevar_1.0]
