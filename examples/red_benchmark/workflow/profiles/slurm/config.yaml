# Snakemake profile for a SLURM cluster (e.g. ETH Euler).
#
#   snakemake --profile workflow/profiles/slurm --config cfg=config/sweep.yaml
#
# Needs the SLURM executor plugin (installed with `pip install zombi2[bench]`):
#   snakemake-executor-plugin-slurm
#
# Fill in `slurm_account` (and `slurm_partition` if your cluster requires one). On Euler the
# account is usually your shareholder group; leave the partition unset to use the default.

executor: slurm
jobs: 200                      # max concurrent cluster jobs
latency-wait: 60
retries: 1
printshellcmds: true
use-conda: false               # set true (+ a per-rule env) to deploy zombi2 from conda on nodes

default-resources:
  slurm_account: "CHANGE_ME"   # <-- your Euler/SLURM account/shareholder group
  # slurm_partition: ""        # <-- uncomment/set only if your cluster requires an explicit partition
  runtime: 30                  # minutes
  mem_mb: 2000
  cpus_per_task: 1

# Per-rule overrides — bigger trees / summarize want a little more.
set-resources:
  simulate_timetree:
    runtime: 30
    mem_mb: 4000
  perturb_and_red:
    runtime: 20
    mem_mb: 2000
  summarize:
    runtime: 30
    mem_mb: 4000
