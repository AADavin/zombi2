<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c9d1d9"/>
    </marker>
  </defs>

  <!-- connectors (drawn first, under the boxes) -->
  <!-- species -> genomes / traits : conditioned-on (dashed) -->
  <line x1="318" y1="104" x2="236" y2="206" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="402" y1="104" x2="504" y2="206" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- genomes <-> traits : composable on the same tree (dashed) -->
  <line x1="307" y1="250" x2="443" y2="250" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- genomes -> sequences : sequences evolve along the gene trees (solid, directed) -->
  <line x1="200" y1="294" x2="200" y2="386" stroke="#c9d1d9" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- species -->
  <rect x="263" y="28" width="194" height="76" rx="12" fill="#22272e" stroke="#c9d1d9" stroke-width="2.2"/>
  <text x="360" y="63" text-anchor="middle" font-size="23" font-weight="bold" fill="#e6edf3">species</text>
  <text x="360" y="86" text-anchor="middle" font-size="15" fill="#909dab">dated tree</text>

  <!-- genomes -->
  <rect x="95" y="208" width="210" height="84" rx="12" fill="#22272e" stroke="#c9d1d9" stroke-width="2.2"/>
  <text x="200" y="247" text-anchor="middle" font-size="23" font-weight="bold" fill="#e6edf3">genomes</text>
  <text x="200" y="270" text-anchor="middle" font-size="15" fill="#909dab">gene families</text>

  <!-- traits -->
  <rect x="445" y="208" width="190" height="84" rx="12" fill="#22272e" stroke="#c9d1d9" stroke-width="2.2"/>
  <text x="540" y="247" text-anchor="middle" font-size="23" font-weight="bold" fill="#e6edf3">traits</text>
  <text x="540" y="270" text-anchor="middle" font-size="15" fill="#909dab">phenotypes</text>

  <!-- sequences (leaf level: dashed border) -->
  <rect x="95" y="388" width="210" height="80" rx="12" fill="#1c2128" stroke="#c9d1d9" stroke-width="2.2" stroke-dasharray="7 5"/>
  <text x="200" y="425" text-anchor="middle" font-size="23" font-weight="bold" fill="#e6edf3">sequences</text>
  <text x="200" y="448" text-anchor="middle" font-size="15" fill="#909dab">DNA / protein</text>
</svg>
