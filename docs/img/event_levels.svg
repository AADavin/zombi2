<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" font-family="Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="720" height="460" fill="white"/>

<!-- centered title -->
<text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Events nest by level</text>

<!-- Outer: nucleotide (superset of ordered) -->
<rect x="48" y="56" width="624" height="376" rx="18" fill="none" stroke="#1a1a1a" stroke-width="1.7"/>
<text x="360" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Nucleotide</text>
<text x="360" y="110" text-anchor="middle" font-size="12" fill="#1a1a1a">+ insertion, deletion, pseudogenization, homologous replacement, substitution</text>

<!-- Middle: ordered (superset of unordered) -->
<rect x="116" y="130" width="488" height="284" rx="15" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="360" y="160" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Ordered</text>
<text x="360" y="184" text-anchor="middle" font-size="12" fill="#1a1a1a">+ inversion, transposition</text>

<!-- Inner: unordered (the four base gene-family events) -->
<rect x="184" y="204" width="352" height="192" rx="12" fill="#f6f6f6" stroke="#1a1a1a" stroke-width="1.5"/>
<text x="360" y="234" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Unordered</text>
<text x="360" y="254" text-anchor="middle" font-size="11" fill="#8a8a8a">the four gene-family events</text>
<g fill="white" stroke="#1a1a1a" stroke-width="1.5">
<rect x="210" y="272" width="140" height="34" rx="8"/>
<rect x="370" y="272" width="140" height="34" rx="8"/>
<rect x="210" y="322" width="140" height="34" rx="8"/>
<rect x="370" y="322" width="140" height="34" rx="8"/>
</g>
<g font-size="13" fill="#1a1a1a" text-anchor="middle">
<text x="280" y="294">origination</text>
<text x="440" y="294">duplication</text>
<text x="280" y="344">transfer</text>
<text x="440" y="344">loss</text>
</g>
</svg>
