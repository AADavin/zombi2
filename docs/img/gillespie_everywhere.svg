<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1300" height="760" viewBox="0 0 1300 760">
<defs>
</defs>
<rect x="0" y="0" width="1300" height="760" fill="white" />
<text x="650.0" y="42" font-size="32" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="bold" font-style="normal">One engine, many events: it's all Gillespie</text>
<rect x="50" y="105.0" width="700" height="150" rx="16" ry="16" fill="white" stroke="#1a1a1a" stroke-width="2.4" />
<text x="76" y="139.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="bold" font-style="normal">Species tree</text>
<text x="76" y="171.0" font-size="18" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal">rates: lambda, mu  per lineage</text>
<path d="M140,225 L140,212" stroke="#999999" stroke-width="3.0" />
<path d="M140,212 L129,201" stroke="#999999" stroke-width="3.0" />
<path d="M140,212 L151,201" stroke="#999999" stroke-width="3.0" />
<text x="140" y="242" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">speciation</text>
<path d="M311,205 L329,223" stroke="#1a1a1a" stroke-width="3.0" />
<path d="M311,223 L329,205" stroke="#1a1a1a" stroke-width="3.0" />
<text x="320" y="242" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">extinction</text>
<rect x="50" y="295.0" width="700" height="150" rx="16" ry="16" fill="white" stroke="#1a1a1a" stroke-width="2.4" />
<text x="76" y="329.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="bold" font-style="normal">Gene families</text>
<text x="76" y="361.0" font-size="18" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal">rates: duplication, transfer, loss, origination</text>
<rect x="132.0" y="396.0" width="16" height="16" fill="#1a1a1a" />
<text x="140" y="432" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">duplication</text>
<path d="M273.0,412 Q285.0,384,297.0,412" fill="none" stroke="#1a1a1a" stroke-width="3.0" />
<path d="M297.0,412 L289.38808962585114,407.1980399360339 L295.49507931562704,403.12671347618334 Z" fill="#1a1a1a" />
<text x="285.0" y="432" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">transfer</text>
<path d="M421.0,395 L439.0,413" stroke="#1a1a1a" stroke-width="3.0" />
<path d="M421.0,413 L439.0,395" stroke="#1a1a1a" stroke-width="3.0" />
<text x="430.0" y="432" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">loss</text>
<circle cx="575.0" cy="404" r="8" fill="none" stroke="#1a1a1a" stroke-width="3.0" />
<text x="575.0" y="432" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">origination</text>
<rect x="50" y="485.0" width="700" height="150" rx="16" ry="16" fill="white" stroke="#1a1a1a" stroke-width="2.4" />
<text x="76" y="519.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="bold" font-style="normal">Discrete trait (Mk)</text>
<text x="76" y="551.0" font-size="18" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal">rates: the entries of the Q matrix</text>
<rect x="118" y="586" width="15" height="15" fill="#dddddd" stroke="#1a1a1a" stroke-width="1.6" />
<rect x="148" y="586" width="15" height="15" fill="#1a1a1a" />
<path d="M135,594 L146,594" stroke="#1a1a1a" stroke-width="2.4" />
<path d="M146,594 L139.60837741781384,596.854323171417 L139.60837741781384,591.145676828583 Z" fill="#1a1a1a" />
<text x="140" y="622" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">state change</text>
<rect x="880" y="150" width="380" height="460" rx="18" ry="18" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3.0" />
<text x="1070.0" y="196" font-size="22" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="bold" font-style="normal">one Gillespie loop</text>
<text x="914" y="258" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">1.  total rate R = sum</text>
<text x="914" y="292" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal">     of every event's rate</text>
<text x="914" y="326" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal"></text>
<text x="914" y="360" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">2.  when:  draw</text>
<text x="914" y="394" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal">     dt ~ Exponential(R)</text>
<text x="914" y="428" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal"></text>
<text x="914" y="462" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">3.  what:  pick event i</text>
<text x="914" y="496" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal">     with prob. (rate)/R</text>
<text x="914" y="530" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="normal"></text>
<text x="914" y="564" font-size="20" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal" font-style="normal">4.  apply it, then repeat</text>
<path d="M750,180 L877,380.0" stroke="#8a8a8a" stroke-width="2.4" />
<path d="M877,380.0 L866.995708747999,373.37322427230737 L875.2570904436161,368.1272468955905 Z" fill="#8a8a8a" />
<path d="M750,370 L877,380.0" stroke="#8a8a8a" stroke-width="2.4" />
<path d="M877,380.0 L865.6926459521748,384.01792787853765 L866.4608391631582,374.2618740990476 Z" fill="#8a8a8a" />
<path d="M750,560 L877,380.0" stroke="#8a8a8a" stroke-width="2.4" />
<path d="M877,380.0 L874.6813380488319,391.77386116599837 L866.6850546291498,386.13203897544497 Z" fill="#8a8a8a" />
<text x="650.0" y="706" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="italic">The one exception: substituting a sequence along a fixed branch needs only the branch endpoints,</text>
<text x="650.0" y="732" font-size="18" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#8a8a8a" font-weight="normal" font-style="italic">so ZOMBI2 does it in a single matrix step, P(t) = exp(Q t), instead of event-by-event.</text>
</svg>