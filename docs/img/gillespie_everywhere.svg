<text x="1001.0" y="131.0" font-size="22" font-family="Helvetica" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a" font-weight="bold">one Gillespie loop</text>
<text x="846" y="171.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal">1.  total rate R = sum</text>
<text x="846" y="199.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal">     of every event's rate</text>
<text x="846" y="227.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal"></text>
<text x="846" y="255.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal">2.  when:  draw dt ~</text>
<text x="846" y="283.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal">     Exponential(R)</text>
<text x="846" y="311.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal"></text>
<text x="846" y="339.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal">3.  what:  pick event i</text>
<text x="846" y="367.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal">     with prob. (rate)/R</text>
<text x="846" y="395.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#8a8a8a" font-weight="normal"></text>
<text x="846" y="423.0" font-size="22" font-family="Helvetica" text-anchor="start" dominant-baseline="central" fill="#1a1a1a" font-weight="normal">4.  apply it, then repeat</text>
