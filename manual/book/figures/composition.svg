<svg viewBox="0 0 1160 512" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Iowan Old Style, Palatino, Georgia, serif">
<title>Three ways two levels relate: independent, conditioned, joint</title>
<desc>Traits and Genomes on a species tree. Independent has no arrow between them; conditioned has one arrow Traits to Genomes; joint grows both together. Dashed arrows from Species are the always-present substrate.</desc>
<style>
  :root { --ink:#1a1a1a; --paper:#ffffff; --tint:#edeae3; }
  @media (prefers-color-scheme: dark) { :root { --ink:#e7ebe9; --paper:#191d20; --tint:#232a2c; } }
  .node{fill:var(--paper);stroke:var(--ink);stroke-width:1.5}
  .lbl{fill:var(--ink);font-size:14.5px;font-weight:600}
  .ink{fill:var(--ink)}
  .muted{fill:var(--ink);opacity:.6}
  .ttl{font-size:19px;font-weight:600;fill:var(--ink)}
  .note{font-size:13px;fill:var(--ink);opacity:.62;font-style:italic}
  .nota{font-size:13px;fill:var(--ink)}
  .subarrow{stroke:var(--ink);opacity:.5;stroke-width:1.9;stroke-dasharray:2 5;stroke-linecap:round;fill:none}
  .couple{stroke:var(--ink);stroke-width:2.6;fill:none;stroke-linecap:round}
  .capsule{fill:var(--tint);stroke:var(--ink);stroke-opacity:.45;stroke-width:1.4;stroke-dasharray:4 4}
</style>
<defs>
  <marker id="sh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="var(--ink)" opacity=".5"/></marker>
  <marker id="ih" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="var(--ink)"/></marker>
  <marker id="ihs" markerWidth="9" markerHeight="9" refX="1.5" refY="4.5" orient="auto"><path d="M8,0 L0,4.5 L8,9 z" fill="var(--ink)"/></marker>
</defs>

<text x="580" y="30" text-anchor="middle" class="muted" style="font-size:12px;letter-spacing:.14em">TWO LEVELS &#8212; TRAITS AND GENOMES &#8212; ON A SPECIES TREE</text>

<g transform="translate(200,0)">
  <text x="0" y="66" text-anchor="middle" class="ttl">Independent</text>
  <line class="subarrow" x1="-12" y1="132" x2="-78" y2="222" marker-end="url(#sh)"/>
  <line class="subarrow" x1="12" y1="132" x2="78" y2="222" marker-end="url(#sh)"/>
  <rect class="node" x="-52" y="90" width="104" height="42" rx="21"/><text x="0" y="111" text-anchor="middle" dominant-baseline="central" class="lbl">Species</text>
  <rect class="node" x="-140" y="222" width="96" height="42" rx="21"/><text x="-92" y="243" text-anchor="middle" dominant-baseline="central" class="lbl">Traits</text>
  <rect class="node" x="44" y="222" width="96" height="42" rx="21"/><text x="92" y="243" text-anchor="middle" dominant-baseline="central" class="lbl">Genomes</text>
  <text x="0" y="356" text-anchor="middle" class="nota">P(Species) &#183; P(Traits | Species) &#183; P(Genomes | Species)</text>
  <text x="0" y="386" text-anchor="middle" class="note">two commands, any order</text>
</g>

<g transform="translate(580,0)">
  <text x="0" y="66" text-anchor="middle" class="ttl">Conditioned</text>
  <line class="subarrow" x1="-12" y1="132" x2="-78" y2="222" marker-end="url(#sh)"/>
  <line class="subarrow" x1="12" y1="132" x2="78" y2="222" marker-end="url(#sh)"/>
  <line class="couple" x1="-40" y1="243" x2="40" y2="243" marker-end="url(#ih)"/>
  <rect class="node" x="-52" y="90" width="104" height="42" rx="21"/><text x="0" y="111" text-anchor="middle" dominant-baseline="central" class="lbl">Species</text>
  <rect class="node" x="-140" y="222" width="96" height="42" rx="21"/><text x="-92" y="243" text-anchor="middle" dominant-baseline="central" class="lbl">Traits</text>
  <rect class="node" x="44" y="222" width="96" height="42" rx="21"/><text x="92" y="243" text-anchor="middle" dominant-baseline="central" class="lbl">Genomes</text>
  <text x="0" y="356" text-anchor="middle" class="nota">P(Species) &#183; P(Traits | Species) &#183; P(Genomes | Species, Traits)</text>
  <text x="0" y="386" text-anchor="middle" class="note">two commands, Traits first</text>
</g>

<g transform="translate(960,0)">
  <text x="0" y="66" text-anchor="middle" class="ttl">Joint</text>
  <rect class="capsule" x="-150" y="216" width="300" height="54" rx="27"/>
  <line class="subarrow" x1="-12" y1="132" x2="-92" y2="212" marker-end="url(#sh)"/>
  <line class="subarrow" x1="12" y1="132" x2="92" y2="212" marker-end="url(#sh)"/>
  <line class="couple" x1="-40" y1="243" x2="40" y2="243" marker-start="url(#ihs)" marker-end="url(#ih)"/>
  <rect class="node" x="-52" y="90" width="104" height="42" rx="21"/><text x="0" y="111" text-anchor="middle" dominant-baseline="central" class="lbl">Species</text>
  <rect class="node" x="-142" y="222" width="94" height="42" rx="21"/><text x="-95" y="243" text-anchor="middle" dominant-baseline="central" class="lbl">Traits</text>
  <rect class="node" x="48" y="222" width="94" height="42" rx="21"/><text x="95" y="243" text-anchor="middle" dominant-baseline="central" class="lbl">Genomes</text>
  <text x="0" y="356" text-anchor="middle" class="nota">P(Species) &#183; P(Traits, Genomes | Species)</text>
  <text x="0" y="386" text-anchor="middle" class="note">one command</text>
</g>

<line x1="322" y1="452" x2="356" y2="452" class="subarrow" marker-end="url(#sh)"/>
<text x="364" y="452" dominant-baseline="central" class="muted" style="font-size:12.5px">always there &#8212; every level evolves on the tree</text>
<line x1="700" y1="452" x2="734" y2="452" class="couple" marker-end="url(#ih)"/>
<text x="742" y="452" dominant-baseline="central" class="muted" style="font-size:12.5px">a coupling you add</text>
</svg>
