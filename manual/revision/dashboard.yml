- id: D5
  slug: model-overlay-ontology
  title: What kinds of thing are there? (your FUNDAMENTAL issue)
  question: Is `ClaDS` the same kind of thing as `sampling_fraction`? Is `TransferModel` the same kind
    of thing as `Rates`? Commit to a noun set, state it once, and decide whether the code is unified to
    match or the gap is documented honestly.
  severity: foundational
  scope: code-architecture
  status: decided
  decision: 'THE LEVEL-CONFIGURATION ONTOLOGY (Adrian''s FUNDAMENTAL issue). A level run is built from
    FOUR kinds of thing, and the code/manual must mark the difference: (1) PROCESS (pick ONE) - the generative
    model, defined by WHAT THE RATE DEPENDS ON: nothing (constant), time (episodic), ancestry (the literature''s
    ClaDS - rate drifts as lineages split, inherited), standing diversity, or clade. The 5 species ''diversification
    models'' collapse into ONE process + a table answering ''what does the rate depend on?''. Literature
    names (ClaDS, and BiSSE etc.) become FOOTNOTES. (2) SAMPLING (what you OBSERVE) - extant fraction,
    fossils; the true history is unchanged. (3) MECHANICS - how a specific event RESOLVES when it fires
    (transfer recipient choice = TransferModel; conversion overwrite = ConversionModel). Mostly genomes.
    This is the answer to C7.8 ''TransferModel is part of what?''. (4) THE RATE STRUCTURE (base x per-what
    x modifiers) - taught once in ch2, threads through every process. KEY MOVE: the vague word ''OVERLAY''
    is DISSOLVED, not renamed. Mass extinction changes what HAPPENS -> it is a scheduled shock INSIDE
    the process (same family as time-varying rates). Sampling/fossils change what you OBSERVE -> the Sampling
    category. No ''overlay'' bucket remains. CODE CONSEQUENCE (concepts->code->chapter): process = ONE
    pick-one choice, not the current FOUR selection mechanisms (by --diversification value, by len(birth)>1
    arity, by --clade-shift presence, by --per shared knob); sampling+shocks compose with ANY process
    so ClaDS(fossilization=...) stops raising TypeError; mechanics are sub-models of their event. The
    index can be written to the corrected ontology NOW (Adrian: index can anticipate the code fixes).'
  decided_on: '2026-07-17'
  why_it_gates: 'You called C5.8 fundamental and you were right: it is the upstream cause of C5.4, C5.6,
    C5.7, C5.10, C5.11, C7.8, C9.4 and C11.3 — eight comments dissolve once it is settled. It also decides
    whether ch5''s restructure is a section move or a code project.'
  options:
  - label: 'THREE NOUNS, DOCUMENTED ONLY: Process (constant/episodic/clads/diversity-dependent/clade-shift
      — exactly one per run) · Opportunity (`per=`) · Overlay (sampling_fraction, mass_extinctions, fossilization+removal).
      Plus Mechanics (TransferModel/ConversionModel = what an event does once it fires). Ship the capability
      table showing the ad-hoc reality honestly, including the TypeError cells.'
    pros: Answers the question this revision, at prose cost. The table can be GENERATED from `zombi2/species/_caps.py`
      (every model already declares `SpeciesCaps(growth, supports_backward, supports_ghosts, supports_n_tips,
      ...)`, read via `species_caps(model)`), so it can never go stale — a strictly better artefact than
      anything hand-maintained.
    cons: Documents a clean vocabulary over code that does not obey it.
    cost: ~1 day prose + ~1h for the generated table. Discharges C5.7 and C5.8 together.
  - label: 'THREE NOUNS + UNIFY THE CODE: put all five processes on `--diversification` (episodic and
      clade-shift stop being selected by flag arity and flag presence), make the three overlays uniform
      across every process (port fossilization to the Gillespie engine — ~8 lines that `_grow_gillespie`
      simply never got), replace the hand-written mutual-exclusion errors with a compose-ability grid'
    pros: Makes the ontology true rather than aspirational. This IS the crystal clarity you asked for.
    cons: It is real engineering and it can change behaviour.
    cost: 1-2 weeks touching `_caps.py`, `model.py`, `forward.py`, `cli/species.py`. Must not ride inside
      the manual revision.
  - label: No ontology; just ship the capability table so readers can look things up
    pros: Cheapest.
    cons: Leaves the question you called fundamental unanswered.
    cost: ~1h.
  recommendation: 'Option 1 now, option 2 as scheduled follow-on work. **Do not write the clean ontology
    into the manual before the code has it — that moves the lie rather than fixing it.** You are right
    and the code is worse than the prose. The smoking gun: the CLI selects the species process FOUR different
    ways — by VALUE (`--diversification`), by ARITY (`cli/species.py:144`: episodic is entered iff `len(args.birth)
    > 1`), by PRESENCE (`--clade-shift`), and by KNOB (`--per shared`). And the "overlays" are not objects
    at all, they are kwargs duplicated by hand: `sampling_fraction` appears on all 5 classes, but `ClaDS(1.0,
    fossilization=0.3)` raises **TypeError: unexpected keyword argument** — a Python-level error, not
    a modelling error. So your question "are we discussing different models, or things you can combine,
    or different categories?" has the honest answer: all three at once, with no marker telling you which
    is which. Two things I would do immediately regardless: (a) **generate** the species capability matrix
    from `_caps.py` — it is the single strongest artefact available in this whole review and it answers
    C5.7 and C5.8 in one object; (b) name the mechanics pattern in ch7, because it is real and consistent
    and merely unnamed — "a rate model says how often; a mechanics model says what it does; they are the
    only two, because duplication, loss and origination have no choices to make." That last clause is
    the answer to your C7.8 "a part of what?", and it is verifiable.'
