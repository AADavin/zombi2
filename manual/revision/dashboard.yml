  evidence: 'He is RIGHT and it is worse than he thinks. FULL INVENTORY of length knobs:

    (1) ordered, Python: `OrderedGenome(extension=p)` — geometric continuation PROBABILITY, unit = genes,
    default None → single-gene events (genomes/genome.py:581,601; draw at genome.py:652-659, mean 1/(1-p)).

    (2) ordered, CLI: `--mean-length L` — MEAN, unit = genes, default 1 (cli/genomes.py:160-163).

    (3) nucleotide, Python: `simulate_nucleotide_genomes(extension=0.99)` — PROBABILITY, unit = nt, default
    0.99 → mean 100 (nucleotide_sim.py:563,585; nucleotide_genome.py:174, draw at :714-722, `rng.geometric(1-ext)`,
