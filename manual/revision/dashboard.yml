  - 'C5.8: ''This makes me think that the categorization, ontologies are not that clear... This is a FUNDAMENTAL
    issue'''
  explanation: C5.11 argues FROM a clean, generalizable ontology to conclude that occurrence birth–death
    should already be shippable. C5.8, eight sections earlier, argues that the ontology is not clear at
    all. The premise of C5.11 is the thing C5.8 says is missing.
  resolution: 'Both are right, and the tension is the finding. The occurrence channel IS cheap on the
    thinning engine — `_ForwardRates.rates(t)` already returns a 3-tuple (λ, μ, ψ) and `_grow` already
