  status: actionable
  difficulty: large
  scope: structure
  cross_refs:
  - C6.10 (same new section)
  - C6.8 (the figure to be redrawn)
  - C6.7
  evidence: '**He is right, and this is the chapter''s real accuracy bug, not just a clarity wish.** Ch06''s
    §6.2 claims to be the authoritative map of "which events act at which level" (line 25-26) and then
    omits five shipped events. The bullet at line 61-63 says the ordered resolution adds "two **rearrangements**:
    inversion ... and transposition" — full stop. The table at line 73 says "| **Ordered** | inversion,
    transposition |". Both are **incomplete**. What the code actually adds, all verified in `zombi2/cli/genomes.py:169-200`
    and confirmed present in `zombi2.Rates.__init__` (run live — signature includes `translocation`, `fission`,
    `fusion`, `chromosome_origination`, `chromosome_loss`): `--translocation` (a segment/arc moves to
    a *different* chromosome of the same genome; per gene for ordered, per nucleotide for nucleotide;
    needs >1 chromosome; distinct from transposition, which stays on one chromosome); `--fission` (per
    chromosome: splits in two — linear at one breakpoint, circular at two); `--fusion` (per chromosome:
    two chromosomes of the *same topology* merge; a circular+linear pair cannot fuse, genome.py:522-537);
    `--chromosome-origination` (per genome: a de-novo replicon, a plasmid, appears); `--chromosome-loss`
    (per chromosome: a whole chromosome and its genes are lost). All default to 0. Ch09:143-158 and ch10:187-244
    document this tier fully and correctly, under the name **"chromosome tier"** — so ch06 is the *only*
    place that is wrong. His claim "chromosomes are only a part of ordered and nucleotide models" is **correct**:
    ch09:167-172 documents `supported_events()` — `UnorderedGenome` supports `{O, D, T, L}` and "silently
    ignores every rearrangement and chromosome-tier rate"; `OrderedGenome` supports `{O, D, T, L, I, P,
    X}` plus the chromosome tier. The CLI enforces it (`--translocation` errors on unordered, line 366-368;
    `--fission`/`--fusion`/etc. error on unordered, line 393-396). The **figure is also incomplete** —
    docs/img/event_levels.svg''s Ordered box reads only "+ inversion, transposition", omitting the whole
    tier.'
