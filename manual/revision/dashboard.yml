- id: D4
  slug: coevolution-as-category
  title: Is "Coevolution" a thing in itself?
  question: Is Coevolution a real category deserving its own Part, or is it the observation that some
    models read a driver from another level — in which case the models belong in the chapter of the level
    they target, and only the genuinely fused ones need a home?
  severity: foundational
  scope: prose+figures
  status: decided
  decision: 'COEVOLUTION DISSOLVES as a category. Organising distinction = INDEPENDENT / CONDITIONED /
    JOINT (see D17). (1) `coevolve` command RENAMED `zombi2 joint`; holds exactly 5 model families: SSE
    (BiSSE/MuSSE/QuaSSE/HiSSE), key innovation, ClaSSE, co-diversification, trait-gene feedback. These
    are the models that CANNOT be factorised (must run in one command). (2) All other coupled models FOLD
    INTO THE TARGET''s command, driver passed as a FILE (never fold under the driver: the target is the
    output). (3) species:traits and species:genes are NOT couplings; they are model flags on the target''s
    command (e.g. `zombi2 trait --cladogenetic`). (4) ''the factorisation breaks'' is RECOVERED as the
    exact DEFINITION of the 5 joint models (it was applied to 9 edges when true of 5). (5) Coevolution
    PART -> replaced by TWO chapters: joint models + null models. (6) ''Advanced'' rejected as an axis.
    (7) Sequences stay TARGET-ONLY for v1: G-Sequence and T-Sequence joints are real but unbuilt (blocked
    by the exp(Qt) whole-branch assumption -> would need sub-stepping), deferred to `experimental`. Of
    6 level pairs: Species-Sequence ruled out by construction, 3 built, 2 deferred. State the hole plainly.'
  decided_on: '2026-07-17'
  why_it_gates: It decides whether four chapters (141/164/259/89 lines) survive, and therefore Part VI
    of the index (D1). Twenty-six comments hang off it. It also decides whether Figure 14.1 is redrawn
    or deleted.
  options:
  - label: 'KEEP THE PART, RESPINE IT: drop "the factorisation breaks" as the headline, make CONDITIONED
      vs FUSED the organising axis, one table of all nine edges, cut the grammar/diamond/tier apparatus,
      shrink 4 chapters → 2 (fused models + nulls) by folding ch17''s stub into ch16'
    pros: Takes the real insight (the one bit that predicts everything a user sees) without re-cutting
      the same material a third time and without scattering one CLI command across the book. Keeps `zombi2
      coevolve` describable in one place. Reversible.
    cons: Nine of the twelve couplings stay filed under a heading that makes them look harder than they
      are; eight of them are one flag on a model the reader already knows.
    cost: Two chapters rewritten, ch17 dissolved, Fig 14.1 redrawn, the six-edge table demoted from pedagogy
      to lookup. ~3-4 days.
  - label: 'DISSOLVE FULLY: each coupled model moves to the chapter of the level it targets (SSE + key-innovation
      → diversification; cladogenetic/gene-conditioned traits → ch11; trait-linked/punctuational genome
      → ch7; selection/speed → ch12, where they already live on the `sequences` command). One short chapter,
      "When two levels must be grown together", covers only the fused case and the nulls.'
    pros: 'Most elegant, and it matches the code''s dispatch structure: `zombi2/coevolve/` shares no runtime
      machinery — `sse.py` is a Gillespie tree-grower, `trait_gene_feedback.py` is a bespoke OU integrator,
      `sequence_bridge.py` is a Clock subclass. Every model would sit beside the flags it shares an argument
      group with.'
    cons: '`zombi2 coevolve` is ONE command and would be described across four chapters. And it re-litigates
      your by-target call for the second time in three days.'
    cost: Four chapters dissolved into five host chapters + one new short chapter. ~1 week, and it forces
      the CLI question (see D8).
  - label: 'KEEP AS-IS, fix the two real defects: ch15''s headings are prose-first while ch16/ch17 are
      edge-first, and ch17 is an 89-line stub'
    pros: Cheapest; preserves a decision you made 2 days ago.
    cons: Leaves the false headline claim in place, which is the actual source of the illegibility you
      reported.
    cost: ~3 heading renames + one chapter merge. ~half a day.
  recommendation: 'Option 1: keep the Part, respine it on conditioned vs fused, shrink to two chapters.
    You are right that it is deeply confused, and the code agrees with you more bluntly than you did.
    But the axis is not what is broken — **the container word is.** Three findings. (1) **§14.1''s thesis
    is false for most of what it unifies.** It says coevolution is where "the factorisation breaks: the
    levels must be grown together" (ch14:20-22), but §14.4''s own table then admits four of the six edges
    are "overlays on a tree you supply" (ch14:102, :137). An overlay factorises *perfectly* — `traits:genomes`
    is exactly P(S)·P(T|S)·P(G|S,T), i.e. the pipeline with one extra conditioning bar. The chapter contradicts
    itself between §14.1 and §14.4. Only three things genuinely fuse. (2) **The one bit that predicts
    every user-visible difference** — does the tree grow, is `-t` legal, which nulls are legal, bespoke
    Gillespie or modifier — is `is_fused` (grammar.py:432) and `grows_tree` (grammar.py:449). No other
    framing in the part predicts anything: the "adjacent tiers only" rule rules out one edge nobody would
    type, and the three-slot sentence predicts nothing the code checks. (3) **The unifying machinery does
    not exist.** `CouplingGraph`''s own docstring (grammar.py:396-405) reads: "Not on the execution path
    yet — this solver is exercised only by its tests. Nothing in zombi2/cli/ or the bridges consults it."
    I verified: it appears only in `tests/`. The real CLI is an `if eset == {...}` waterfall. I am recommending
    against full dissolution (option 2) only because it costs you the ability to point a `zombi2 coevolve
    --help` reader at one chapter, and because you have now re-cut this material twice — a third re-cut
    on my recommendation is a bad trade against a respine that captures the same insight. If you disagree
    and want option 2, I would not argue hard; it is the more honest structure and the probe makes a good
    case for it.'
