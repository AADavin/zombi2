- id: D2
  slug: level-order-and-parts
  title: S, G, Σ, T — and does the Traits part move?
  question: Is the canonical level order S, G, Σ, T? And if so, does the Traits part move after Sequences,
    or does the convention govern prose enumerations only while the book keeps delivering T before Σ?
  severity: foundational
  scope: prose+code
  status: decided
  decision: '(1) Level ORDER is S, G, Sigma, T and the Traits part MOVES after Sequences: parts become
    Species -> Genomes -> Sequences -> Traits. (2) MAJOR REVERSAL of the original global convention: drop
    single-letter symbols (S/G/Sigma/T) and the ''use the Greek letter Sigma'' instruction ENTIRELY. Levels
    are written as WORDS: Species, Genome, Sequence, Trait. Reason: single letters flipped meaning from
    ZOMBI1 (there S=sequence and T=tree; here they would be species and trait), so ZOMBI1 muscle memory
    misreads them; words cannot collide. Constraint: because Tree and Trait both start ''Tr'', NEVER abbreviate
    a level to its first letter. First level is ''Species'' (not ''Tree''): the object is a tree but everything
    here has a tree, so ''Species'' disambiguates and matches ZOMBI convention.'
  decided_on: '2026-07-17'
  why_it_gates: It decides the index (D1), ~14 prose enumerations, the live `--version` banner, the citable
    title in CITATION.cff, the code's `LEVELS` tuple, four figures, and the book's subtitle. Every one
    of those is a place where a later fix is a book-wide sed with real review cost.
  options:
  - label: Adopt S, G, Σ, T and move Traits after Sequences (parts become S → G → Σ → T → Coevolution)
    pros: 'Follows the real dependency chain: G rides S, Σ rides G''s gene trees, so S → G → Σ is one
      unbroken pipeline with T as the overlay hanging off S. It makes your order feel inevitable rather
      than arbitrary, and it puts Traits adjacent to the Coevolution part that leans on it hardest (4
      of the 6 coevolve edges involve T).'
    cons: Reverses the shipped part order and interrupts nothing else; delivering T last means a reader
      meets the overlay after the pipeline rather than beside its parent.
    cost: 'A `git mv` rotation of `\part{}` blocks + the mkdocs nav. VERIFIED SAFE: `grep ''trait''` over
      ch12 and ch13 returns ZERO hits; ch11 mentions sequences exactly once (line 310); all cross-refs
      are heading-id links, not numbers.'
  - label: Keep S, G, T, Σ (the shipped order) and change the convention to match
    pros: 'Zero work. It is your own C11.1 sub-point (2): T and G are both direct children of S, so introducing
      both before the grandchild Σ is genuinely defensible.'
    cons: Requires abandoning the convention you stated in your brief. The enumerations still need fixing
      (they are inconsistent either way).
    cost: ~14 prose sites + the banner + CITATION.cff, but no file moves.
  - label: Adopt S, G, Σ, T for prose and figures only; leave the chapters at S, G, T, Σ
    pros: Cheapest of the three.
    cons: Chapter 2 would tell the reader the levels are S, G, Σ, T and the book would then deliver them
      in a different order. That is exactly the kind of small incoherence that stops a book being a standard.
    cost: ~14 prose sites; permanent low-grade contradiction.
  - label: Also reorder the code's LEVELS tuple (grammar.py:52)
    pros: A house convention the source contradicts will rot within two releases, and grammar.py:52 is
      where a future contributor copies the order from.
    cons: LEVELS is iterated and feeds `_SCC(LEVELS, self._edges())` at grammar.py:423, so component numbering
      could shift in a tie. Behaviour-adjacent.
    cost: One line + a full suite run. Must NOT ride inside a prose commit.
  recommendation: 'Option 1: adopt S, G, Σ, T and move Traits last. But the decisive fact is not my preference,
    it is this: **your order currently occurs ZERO times in the repository.** I counted every four-level
    enumeration across manual/, docs/, web/, zombi2/ and README — "species, genomes, sequences and traits"
    = 0. What exists instead is TWO different wrong orders coexisting: S,G,T,Σ in ch1:33, ch2:146, `zombi2/cli/framework.py:49`
    (the live --version banner), `CITATION.cff:3` (the citable title), web/index.html:7,11; and S,T,G,Σ
    in ch14:51-55 and `zombi2/coevolve/grammar.py:52`. So there is nothing to preserve and everything
    to fix; the only question is which target. I recommend Σ before T because the pipeline is real and
    the move is provably safe (zero coupling between ch11 and ch12/13). Do the cheap half of the code
    fix regardless: `zombi2/cli/main.py:90` says ''{species, genomes, traits}'' while `zombi2/cli/coevolve.py:251`
    says ''{species, traits, genomes}'' — the same CLI contradicts itself in two help strings.'
  blocks:
  - CGLOBAL.2
  - C1.6
  - C1.7
  - C2.3
  - C11.1
  - C1.1
- id: D3
  slug: rate-vocabulary
  title: One word for a rate (your dedicated session)
  question: What is `base × opportunity × modifiers` called, what is each factor called, and can §2.3
    keep using the word "clock" when the API already owns it for something else?
  severity: foundational
  scope: prose+figures
  status: decided
  decision: 'Rates live as a SECTION of chapter 2 (the tour), not a separate chapter. The rate structure
    taught there is base x per-what x modifiers. ''Modifier'' is RESERVED for the context multiplier in
    this formula - do NOT reuse it for sampling/shocks (see D5). Also settled earlier: delete ''propensity''
    (2x in book, 0x in source); reserve ''clock'' for the sequence-clock modifier (ch7), not the rate;
    ''opportunity'' -> the question ''per what?''. Fix regardless: per=''site'' is documented and raises
    ValueError; --rate-per vs --per disagree across subcommands; --rate-model shared maps to --rate-per
    copy.'
  decided_on: '2026-07-17'
  why_it_gates: Chapter 2 is the book's vocabulary chapter and every downstream chapter quotes it. §2.3
    is currently the most-damaged prose in the manual and you flagged it hardest. It blocks ch2's rewrite,
    ch2's vocabulary section, ch6 entirely, ch7's largest section, ch13 §13.5, Figure 2.2, and docs/guide/rates.md.
    Nothing in Waves 3-7 can start until it lands.
  options:
  - label: 'RATE ONLY: total rate = base rate × count × modifiers. Delete "propensity"; delete "clock"
      from §2.3 and reserve it for Ch13; replace "opportunity" with the question "per what?" and, where
      the number must be named, "count".'
    pros: 'Keeps the promise §2.3 makes on its own line 52 ("everything is driven by a rate") — under
      this choice the word never disappears, which is exactly your complaint. Matches docs/guide/rates.md:29
      ("rate = base × opportunities × modifiers"), already published, so nothing must be un-shipped. Matches
      the source: `zombi2/species/forward.py:376` literally computes `total_rate`. And "per what?" is
      what the flag already says — `--rate-per UNIT`, metavar `UNIT` — so prose, CLI and Python (`per=`)
      become the same word for the first time.'
    cons: Kills the house slogan "how many clocks, how fast" (the §2.3 title, the Fig 2.2 title, an internal
      design-thread name). That has real emotional cost and it is why this is yours to call.
    cost: ~2 prose sites for "propensity", ~11 for "opportunity", ~30 for "clock" in ch2 only, 6 in docs/guide/rates.md.
      Figure 2.2 (`figures/scripts/fig_rate_clocks.py` → `docs/img/rate_clocks.svg`) says "clock" 8 times
      and must be regenerated. ZERO code changes, zero behaviour change, zero RNG change.
  - label: 'PROPENSITY, DEFINED ONCE: keep "propensity" for the product, reserve "rate" strictly for the
      base'
    pros: Chemically standard; Appendix A already teaches Gillespie, and it is his word.
    cons: docs/guide/rates.md:29 must retract its published headline equation. It fights the user's mental
      model, since every CLI flag (--dup, --birth, --rate-per) says "rate". And "propensity" is already
      used, correctly and differently, in docs/cookbook/universal-core-rates.md for ALE's odds — an unforced
      collision.
    cost: ~6 prose sites in the manual + a docs retraction + the cookbook collision.
  - label: 'BASE vs EFFECTIVE: effective rate = base rate × count × modifiers'
    pros: Plain, readable, and "effective" is a word biologists are comfortable with.
    cons: '"Effective" is pre-loaded in this field (effective population size) and invites "effective
      for whom?". It also appears exactly once today (docs/guide/rates.md:142), so it is a coinage.'
    cost: Same as option 1.
  - label: Status quo
    pros: Zero work.
    cons: The manual says "everything is a rate" on line 52 and then prints an equation containing the
      word zero times on line 67. "Clock" means the opportunity on line 60 and the modifier on line 119,
      57 lines apart. Appendix A:32-34 explicitly warns the reader off the ticking-clock metaphor that
      §2.3's whole framing rests on.
    cost: Zero now; you re-read this section next year and file the same comment.
  recommendation: 'Option 1, "rate = base × count × modifiers", and "per what?" as the recurring question
    in place of "opportunity". Three findings make this decisive rather than a taste call. (1) **"Propensity"
    is a hapax legomenon**: it appears exactly twice in the entire manual (ch2:65, ch2:67), one line apart,
    and never again in 17 chapters — and `grep -rni propensity zombi2/ rust/` returns ZERO. The manual
    invented a name for a variable that already had one. (2) **"Clock" is already taken by this codebase
    for the opposite thing**: `zombi2/__init__.py:64-66` exports seven `*Clock` classes and `zombi2 sequences
    --clock` is a flag, and in the API a clock is a per-branch rate multiplier — i.e. exactly what §2.3
    calls a *modifier*. The section collides with itself inside 60 lines, and ch13 uses "clock" 101 times
    in the modifier sense, outvoting ch2''s 30 by more than three to one. (3) **"Opportunity" is not an
    API**: no class, function, parameter or flag is named it; the knob is `per=`. So the rename costs
    eleven prose edits and one argparse help string, and buys the first alignment between the book and
    the terminal. I would reject "grain" specifically: it collides with "resolution" (see the stale claims),
    and trading one naming collision for another is not progress. Also on this session''s agenda, independent
    of which option wins: `per="site"` is documented at ch2:82 and ch2:137 and **raises ValueError** (`rates.py:174`)
    — pure fiction, fix regardless; `--rate-per` vs `--per` disagree about which is canonical between
    the `species` and `genomes` commands; and `--rate-model shared` maps to `--rate-per copy` (`cli/genomes.py:344`),
    so the word "shared" is simultaneously a synonym for and an antonym of "copy", both live today.'
