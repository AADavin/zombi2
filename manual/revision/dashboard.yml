  evidence: '"opportunity" appears 11 times across ch02, ch06, ch07. It is load-bearing: ch02:67 sets
    it in a display equation — propensity = base(how fast) × opportunity(how many clocks) × modifiers(context)
    — and ch02:70 defines it dimensionally as "a *count* (dimensionless)". Critically, **the term is prose-only**:
    the code never says "opportunity" in any public name. The knob is `per=` in Python (`zombi2.Rates(per="copy"|"lineage"|"shared")`,
    verified by running it) and `--rate-per`/`--per` on the CLI (`zombi2/cli/genomes.py:36`). The word
    "opportunity" appears only in argparse help text (`cli/genomes.py:38`: "what each rate is counted
    per — the opportunity that scales it"). So renaming costs ~11 prose edits + 1 help string. No API
    break. Cheap in mechanics, expensive in that it must be decided once for the whole book.'
  recommendation: 'Concrete alternatives, ranked. **(1) "the counting unit" / "the unit"** — my recommendation.
    It is literally what the flag says (`--rate-per UNIT`, metavar is already `UNIT` in cli/genomes.py:37),
    it is a count (matching ch02:70''s dimensional claim), and it survives the sentence "the unit each
    rate is counted per: gene copy, lineage, or the whole family". Zero jargon. **(2) "the rate basis"**
    — standard in demography/epidemiology ("per-capita basis"), precise, but slightly formal and "basis"
    is overloaded in maths. **(3) "the denominator"** — maximally concrete (rates are per *what* on the
    bottom), and it makes "per copy" vs "per lineage" instantly legible; but it is metaphorical, since
    no division actually happens in the propensity. **(4) "grain"** — evocative and short, but ecology/GIS
    already own it (grain vs extent) with a different meaning, and it collides conceptually with "resolution"
    from C6.4, which is fatal: you cannot have "resolution" mean the genome model and "grain" mean the
    rate unit without readers conflating them. **Reject "grain" specifically because of C6.4.** **(5)
    "clock count"** — matches the chapter''s own "how many clocks" slogan (ch02:51 heading, figure `rate_clocks.pdf`),
    but it is awkward as a noun in running prose. Suggested resolution: keep the "how many clocks, how
    fast" *slogan* as the intuition (it is already in a heading and a figure and it works), and rename
    the *technical noun* from "opportunity" to "**the counting unit**", so the sentence becomes "the second
    choice is the **counting unit** — what each rate is counted per (`--rate-per`)". This aligns prose,
    flag name and metavar for the first time. Must be decided jointly with C2.10; do not settle it in
    ch06 alone.'
  outcome: null
  blocked_by:
