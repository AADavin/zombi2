  ask: Say plainly what the clock does to the gene tree and why the phylogram is produced at all, because
    the current language leaves the reader unable to tell.
  anchor: manual/chapters/12-sequence-evolution.md:13-17 (chapter opener) and :157-162 (§Simulating sequence
    alignments)
  status: needs-decision
  difficulty: medium
  scope: prose
  cross_refs:
  - C12.4 (a per-chapter Outputs section would have forced the phylogram-as-deliverable point early)
  - Ch13 §Drawing a phylogram
  - C12.1 (both are symptoms of the chapter never defining what a rate is *attached to*)
  evidence: 'He is right, and I can name the exact failure. WHAT THE CODE DOES: SequenceEvolution._scale_families
    (zombi2/sequences/evolution.py:163-196) walks each reconciled gene tree and calls _annotate (:209-218),
    which sets subst[node] = s_g · ∫ R_b dt over the node''s [birth, end] interval. That is a rescale:
    it fills a branch-LENGTH map and never touches topology, so the answer to his literal question is
    that the clock does NOT modify gene tree *shape* — the topology is exactly the reconciled one, only
    the length units change from time to substitutions/site. Then, and only then, evolve_on_tree consumes
    that subst map (evolution.py:152-161: "These are exactly what evolve_on_tree consumes to simulate
    a sequence alignment along the rescaled tree"). So the pipeline is unambiguously RESCALE-FIRST, THEN
    EVOLVE ALONG THE PHYLOGRAM — not "evolve along the timetree with a varying rate". His alternative
    is mathematically equivalent (expected substitutions on a branch = rate × time either way) but it
    is not what the code does, and it would throw away the phylogram, which is a first-class deliverable:
    without --subst-model the command writes ONLY the rescaled trees (cli/sequences.py:328-338, and the
    flag help says "Omit to only rescale the trees (no sequences)"). WHERE THE LANGUAGE BREAKS, precisely,
    three places: (1) :13-15 "overlays a substitution rate that varies across the tree and rescales every
    branch" — "varies across the tree" invites the reading that the tree is being altered; nothing says
    the topology is untouched. (2) The whole chapter through :155 is about rescaling and never says why
    anyone wants a phylogram; §Simulating sequence alignments only arrives at :157 and is introduced as
    "the natural next step", i.e. as an afterthought, so for 155 lines the reader has no idea whether
    sequences exist. (3) The one sentence that resolves his confusion is real but is the LAST paragraph
    of the chapter, :220-223: "The rescaled branch lengths already carry the gene × lineage clock, so
    --subst-model needs no extra rate: one unit of branch length is one expected substitution per site
    by construction." That is the thesis, buried in a :::note on the final line.'
  recommendation: 'Do not restructure the model — the code''s order is the right one and the phylogram
    is a genuine product (it is what you hand to a tree-inference benchmark). Fix the prose in three moves.
    (1) In the opener, add one sentence stating the invariant explicitly: "The clock never changes a gene
    tree''s topology or its ancestry. It changes only what a branch length *means*: the same branch, reinterpreted
    from an amount of time into an expected number of substitutions per site." That answers "do the clocks
    modify the gene tree shapes" head-on, with a no. (2) Promote the buried note from :220 into the opener,
    so the reader knows from line 20 that the phylogram is not scaffolding: the phylogram IS the deliverable,
    and sequences are then drawn down it at exactly one expected substitution per unit length. (3) Add
    a two-line remark acknowledging his equivalence, because he will not be the only reader who has it:
    "Equivalently, one could evolve sequences directly along the timetree at a rate that varies branch
    by branch; the two are the same model. ZOMBI2 does the rescale first because the phylogram is itself
    a thing you want on disk — it is the ground truth a reconstruction method is scored against." That
    converts his confusion into a teaching moment instead of papering over it.'
