- id: D9
  slug: diamond-replacement
  title: '"Diamond" is banned — what replaces it?'
  question: You said what not to call it, not what to call it. Does the four-level layout get a new noun,
    or none?
  severity: major
  scope: prose+figures
  status: decided
  decision: '''Diamond'' BANNED, replaced by NOTHING. The layout is just ''the four levels of ZOMBI2'';
    describe it, let the figure carry the shape. Purge the word from user-facing text (the shipped sequences
    --help string; the coevolve_modes4.svg title text). Leave the 3 legitimate marker-shape uses (ch5:228,
    ch16:46,111) - do NOT sed.'
  decided_on: '2026-07-17'
  why_it_gates: Nothing can be purged until the replacement exists, and the purge touches 12 user-facing
    sites, two rendered figures and the shipped CLI help.
  options:
  - label: 'NAME NOTHING: describe it ("the four levels", "the layout", "the last tier") and let the figure
      carry the shape'
    pros: 'The cleanest read of your intent: the shape is a plotting convention, not a concept, so it
      belongs in the picture. Also frees you from defending a coinage.'
    cons: Section headings that named the shape need rewriting rather than renaming (ch14:48 is a heading
      and owns a ToC entry + an anchor slug).
    cost: ~12 user-facing sites + one figure regen + one CLI string. ~1h.
  - label: 'COIN A NEUTRAL NAME: "the level graph" / "the coupling graph"'
    pros: Gives ch14 a noun for a thing it refers to repeatedly.
    cons: A second coinage to defend, and it collides with `CouplingGraph` the class.
    cost: Same ~12 sites.
  - label: Ban it in the manual and docs/guide only; leave design docs, code comments and filenames
    pros: Bounded.
    cons: None. This is orthogonal and should be combined with whichever noun wins.
    cost: Saves ~30 internal edits.
  recommendation: 'Option 1 for user-facing text, combined with option 3''s scoping: leave `manual/REVISION_NOTES.md`
    (~18) and `docs/design/coevolve-grammar.md` (~12) alone, and leave the filenames (`levels_diamond.svg`,
    `fig_levels_diamond.py`) — no reader sees a figure-script filename, and renaming cascades into the
    manual''s includes and the Makefile for zero reader benefit. Four things you should know before deciding.
    (1) **A banned word is shipping in the binary**: `python -m zombi2 sequences --help` prints "the sequences
    tier of the coevolution diamond (docs/design/coevolve-grammar.md §5)" — `zombi2/cli/sequences.py:138`.
    It also cites an internal design doc at the user, which is its own bug. (2) **It is burned into a
    figure**: `docs/img/coevolve_modes4.svg:7` has "The coevolution diamond: species, traits, genomes,
    sequences" as rendered title TEXT, so prose-only edits leave the word visible in the PDF; it needs
    `figures/scripts/fig_coevolve_modes4.py:123` + `make figures`. (3) ⚠️ **Do not sed.** Three hits are
    legitimate marker shapes — ch5:228 (fossil tips drawn as diamonds), ch16:46, ch16:111 — and a blind
    find-and-replace corrupts all three captions. (4) **You are reversing yourself, and you should know
    the scope of it**: `manual/REVISION_NOTES.md:175` records "RATIFIED 2026-07-15 — the diamond''s node
    names", and three surfaces (the landing page, the docs home, the guide) were deliberately reshaped
    to it two days ago. The SHAPE survives — only the WORD dies. That is a cheap reversal and I think
    a correct one, because the manual already uses "diamond" for marker shapes, so the word is genuinely
    overloaded inside this book. That is a technical argument, not a matter of taste.'
  blocks:
