- id: C5.8
  chapter: '5'
  kind: FQ
  verbatim: '5.3 it says: It accepts sampling_fraction and mass_extinctions overlays like BirthDeath ->
    This makes me think that the categorization, ontologies are not that clear (connected to my previous
    point 4). Are we just discussing different models? Or things that you can combined? Or different general
