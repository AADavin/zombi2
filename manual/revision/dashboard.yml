- id: C7.6
  chapter: '7'
  kind: GC
  verbatim: Emission/receptivity. Interesting terms, probably we need to discuss them and agree on what
    to call them, there might be better alternatives
  ask: Decide whether 'emission' and 'receptivity' are the right names for the donor-side and recipient-side
    transfer dials.
  anchor: 'manual/chapters/07-unordered-genomes.md:179-202 (§7.3.2 ''Transfer emission and receptivity'');
    code: zombi2/genomes/transfers.py:33-42, rates.py:498-499 & 656-661, read_rates.py:100-108, cli/genomes.py:92-95'
  status: needs-decision
  difficulty: medium
  scope: prose+code
  cross_refs:
  - C7.7 (§7.2.4 forward-references both terms before §7.3.2 defines them)
  - C7.8 (same emission-seam / recipient-seam vocabulary)
  evidence: 'WHAT THEY MEAN, and the asymmetry any rename must preserve. **Emission** = how often a lineage
    *donates*. It is a **rate multiplier**, implemented as `LineageRates(base, factors={...}, events=(''transfer'',))`
    — an ordinary `LineageModifier` on the transfer rate, nothing transfer-specific about the mechanism
    (rates.py:651-679; docstring calls it ''the transfer-*emission* dial''). **Receptivity** = how likely
    a lineage is to *receive*. It is NOT a rate: it is a **selection weight** on recipient choice, a field
    on `TransferModel` (`receptivity: dict | None = None`, transfers.py:56), multiplied into each candidate''s
    weight alongside `distance_decay` and the `PairModifier`. The code names the two sides ''emission-seam''
    vs ''recipient-seam'' (rates.py:498-499, transfers.py:47-48). So the two words are NOT a symmetric
    pair, and the manual is honest about it (lines 184-193: ''is a *rate*'' vs ''is a *selection weight*'').
    REACH: load-bearing in five places — the public `TransferModel(receptivity=)` kwarg; the `--lineage-rates`
    TSV column headers `emission`/`receptivity`, matched literally (`header.index(''emission'')`, read_rates.py:100-108);
    the CLI help (cli/genomes.py:93-95); the Rust bridge (`_rust.py:169 def _receptivity`); and the docstrings.
    ASSESSMENT: ''receptivity'' is defensible and reads well; **''emission'' is the weaker half** — it
    suggests something radiated that may not be received, and it collides with an unrelated internal sense
    already in the codebase (''the engine''s emission order'' for matrix columns, _rust.py:230,244). Neither
    is standard HGT vocabulary, where the literature just says donor and recipient.'
  recommendation: 'His call, but I recommend: **keep `receptivity`, rename `emission` → `donation`.**
    ''Donation / receptivity'' pairs the two sides through donor/recipient language a biologist already
    has, and drops the radiative metaphor. Section title becomes ''Transfer donation and receptivity''.
    Alternatives ranked lower: ''donor propensity / recipient propensity'' (symmetric but FALSE — one
    is a rate, one is a weight, and the manual works hard to keep that visible); ''emissivity / receptivity''
    (prettier symmetry, doubles down on the physics metaphor); ''export / import'' (implies a directed
    pair, which is what `PairModifier` does, not this). If he accepts, do it with back-compat: keep `emission`
    as an accepted TSV column synonym — read_rates.py:105-106 already does exactly this pattern for `branch`→`lineage`,
    so the cost is near zero. If he prefers no code churn, the cheap alternative is doc-only: keep the
    identifiers but have §7.3.2 lead with ''donor'' and ''recipient'' and treat emission/receptivity as
    the *names of the dials*, not the concepts.'
  outcome: null
  blocked_by: []
