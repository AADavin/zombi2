    (5) indels, Python: `indel_mean_length=10` — MEAN, unit = nt (nucleotide_sim.py:561; draw at nucleotide_genome.py:726-733,
    `rng.geometric(1/m)`, mean m).

    (6) indels, CLI: `--indel-mean-length L` — MEAN, unit = nt, default 10 (cli/genomes.py:215-218).

    So: the CLI is CONSISTENT (two mean-length knobs in nucleotides). The PYTHON API is NOT (one probability
    + one mean). There is NO `--extension` CLI flag at all — I checked `zombi2 genomes --help`; only `--mean-length`
    and `--indel-mean-length` appear. `_extension_from_mean_length` (cli/genomes.py:284-292) does `extension
    = 1 - 1/L`, exactly matching the geometric mean, so the conversion is correct.

