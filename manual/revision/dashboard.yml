  evidence: '`zombi2/coevolve/gene_diversification.py:91-92` applies no sign constraint to the effect
    vectors (only λ0/μ0/loss/origination/transfer are checked ≥ 0 at :82-85); rates are λ = λ0·exp(Σβλ),
