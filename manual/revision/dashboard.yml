  ask: Either implement the occurrence birth–death process or delete the warning that advertises its absence.
  anchor: 'manual/chapters/05-diversification-models.md:230-233 (the `::: warning` at the end of §5.6)'
  status: needs-decision
  difficulty: medium
  scope: prose+code
  cross_refs:
  - C5.8 (he is arguing FROM an ontology that does not exist yet)
  - C5.12 (the note immediately below this warning)
  evidence: '**Verified not shipped**: `grep -rni occurrence zombi2/ --include=*.py` returns only three
    unrelated hits (geneorder_export.py:156, :176, genomes/genome.py:688 — all the English word ''occurrence'').
    No ω parameter, no occurrence record type. The citation `andreoletti2022occurrence` IS in docs/references.bib:176,
    so deleting the warning would strand a bib entry (harmless — pandoc only emits cited entries).


    **Your instinct is right about the difficulty.** An occurrence is a fossil observation that is recorded
    but NOT placed as a tip. In this architecture that is a third Poisson rate on each live lineage that,
    when it fires, appends `(lineage_id, time)` to a side list and does *nothing to the tree*. The thinning
    loop already has the shape: `_ForwardRates.rates(t)` already returns a 3-tuple `(λ, μ, ψ)` (forward.py:64-66,
    :75) and `_grow` already branches on a third outcome at forward.py:168-175. Adding ω is genuinely
    ~20 lines there.


    **But ''this same forward machinery'' is doing a lot of work in that sentence, and it is the C5.8
    problem again.** Fossilization ψ lives ONLY on the thinning engine. `_grow_gillespie` (forward.py:355)
    has no ψ at all — its views return 2-tuples `(λ, μ)`, not 3-tuples. So ''the same forward machinery''
    means ''the BirthDeath/Episodic half of the forward machinery''. Shipping occurrences on top of ψ
    would extend a feature that is *already* only half-general. Real cost: ω on the thinning loop (~20
    lines) + an output format for the occurrence stream (a TSV — there is no existing home for ''observations
    that are not tips'') + tests + docs ≈ 2-3 days. If you also want it uniform across ClaDS/DD/CladeShift
    (which the C5.8 ontology would demand), add the ψ/ω port to the Gillespie engine, ≈ +2 days.'
  recommendation: '**Delete the warning now; do not implement as part of the manual revision.** Reason:
    a manual should describe what exists, and a callout box whose content is ''a thing you cannot do''
    is exactly the ''making a big deal out of it'' you objected to in C5.3 and C5.5. If occurrence BD
    is worth shipping, it is worth a decision of its own (scope:occurrence-bd) rather than being smuggled
    in through a doc review. My read: it IS cheap and it IS a clean fit, but it is a research feature
    with no downstream consumer in ZOMBI2 today (nothing reads occurrence data), so I would defer it and
    delete the warning. If you want it, do it AFTER the C5.8 unification, so it lands on all five processes
    instead of two.'
  outcome: null
  blocked_by:
  - D5
