    (1) PROSE ALREADY FOLLOWS THE FIELD. Ch2 glossary 02-a-tour-of-zombi2.md:151-153: ''the *complete*
    tree keeps every lineage, including those that went extinct; the *reconstructed* tree is pruned to
    the sampled survivors''; 02:155-157 reserves ''Extant / extinct / unsampled'' for TIPS. Ch4:21-22
    and Ch4:98-100 match, citing @nee1994reconstructed. ''reconstructed tree'' = 47 hits in manual+docs.


    (2) GENE TREES BREAK IT — the actual bug. ''extant tree'' is used as a TREE NAME 17×: 08-gene-trees-and-output.md:44,47,52;
    03-getting-started.md:154-158; 12-sequence-evolution.md:100,175; docs/guide/sequences.md:197; docs/guide/genomes.md:1109;
