- id: D8
  slug: api-tells-the-story
  title: Must the API speak the vocabulary the book teaches?
  question: 'When the manual teaches a vocabulary, must the Python API expose it? Three instances: the
    coevolution grammar has zero public exports and its solver is dead code; there is no `simulate_sequences`;
    and `--couple`''s colon means three different things.'
  severity: major
  scope: code-architecture
  status: open
  decision: null
  decided_on: null
  why_it_gates: It decides whether ch14/ch15 describe a language the reader can speak, and whether ch1's
    four-level promise is honoured by four Python verbs. It is your C15.2, which you marked THIS IS AN
    IMPORTANT COMMENT.
  options:
  - label: 'CHEAP 80% NOW: (a) export the grammar surface (`Coupling`, `couple`, `Scalar`, `Table`, `Curve`,
      `Jump`, plus species_bridge''s two simulate_* functions) from `zombi2.coevolve`; (b) ship `simulate_sequences`;
      (c) publish a one-row-per-level "what each simulate_* returns" table and demote `GenomeResult` from
      `__all__`; (d) change the grammar SENTENCE''s colon, not the CLI''s'
    pros: '(a) is ~20 lines, purely additive, zero breakage — and the code already exists and is tested;
      it is simply not exported. (b) closes the one real hole: the sequences level is ''a CLI with a library
      underneath'' while the other three are ''a library with a CLI on top''. (d) is prose-only and the
      dotted form (`traits → species.speciation`) makes C15.3''s ''BiSSE is two couplings'' typographically
      obvious.'
    cons: The grammar is exported but the CLI still runs the legacy engines, so a seam remains.
    cost: (a) ~1h. (b) ~1 day — ~130 lines of orchestration currently trapped in `zombi2/cli/sequences.py:261-392`,
      plus a result class + tests. (c) ~2h. (d) prose only.
  - label: 'FULL: also wire `CouplingGraph` and `make_null` into the CLI (the standing P3), retiring the
      `if eset == ...` waterfall'
    pros: Makes the manual literally true.
    cons: Weeks, and it can change simulation output.
    cost: 3-5 days minimum on `zombi2/cli/coevolve.py` (400+ lines of bespoke dispatch). Should not block
      the manual.
  - label: 'DOC-ONLY: soften ch14:44-46 so the grammar is described as a conceptual map, not the primary
      API'
    pros: Zero code.
    cons: Concedes that the grammar was a story. And ch14:44-46 currently claims 'the structural name
      driver:target is primary' when the API says the exact opposite.
    cost: ~3 prose sites.
  - label: Rename TraitResult → Traits for full result symmetry
    pros: Tree / Genomes / Sequences / Traits reads as one family.
    cons: 76 references, a public break, aesthetic gain only.
    cost: ~2h + a deprecation cycle. Not worth it.
  recommendation: 'Option 1, and **never option 3**. Your C15.2 is right and the code says so more bluntly
    than you did: I verified at runtime that `zombi2.coevolve.__all__` contains BiSSE, MuSSE, HiSSE, QuaSSE,
    simulate_sse and **zero grammar names** — `hasattr(z, ''Coupling'')` is False. A user cannot write
    a `Coupling`. And the dependency runs backwards from the story: `species_bridge.py:59-61` compiles
    the grammar DOWN into `simulate_sse`, and its own docstring calls itself "a thin, grammar-native front-end
    over the existing SSE engine". So `simulate_sse`/`BiSSE` is not a legacy alias sitting on the grammar
    — the grammar sits on IT. Exporting is 20 lines and turns ch14 from aspiration into documentation;
    that alone makes the manual honest without option 2''s weeks. On `simulate_sequences`: **your premise
    in C1.10 is half stale — `z.simulate_traits` already exists** (`zombi2/__init__.py:82`), so half of
    what you asked for is shipped and merely undocumented in ch1. Document that today; build `simulate_sequences`
    as scheduled work, and resolve the name collision first (`simulate_sequences` is already taken as
    a method on `NucleotideResult`, `nucleotide_sim.py:366`). On the colon: **change the sentence, not
    the CLI.** The colon-as-arrow is load-bearing in every user-facing surface (`--couple X:Y`, the six
    edge names, the tables); the sentence''s colon is the newcomer and appears only in prose we control.
    Note the collision is printed 33 lines apart on the same page — ch14:27 shows `driver → target-variable
    : response` and ch14:60''s caption shows `--couple driver:target` — which is why you caught it on
    one read.'
