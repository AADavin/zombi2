- name: One word, two meanings; two words, one meaning
  description: The most pervasive defect, and the one your instinct kept detecting from different angles.
    `shared` = an opportunity (one clock for the process) AND a heterogeneity (all families share a rate)
    — and `--rate-model shared` literally maps to `--rate-per copy` (cli/genomes.py:344), so it is simultaneously
    a synonym for and an antonym of `copy`. `clock` = the opportunity (ch2:60) AND the modifier (ch2:119,
    and 148 uses in ch12/13). `level` = a domain AND a genome resolution — ch9:43 says 'The ordered level
    is also a --genome-resolution' in eleven words. `tier` = the chromosome tier AND DAG depth AND a synonym
    for level. `extant` = a tip AND a tree. `reconstructed` = Nee's pruned tree AND 'we built it' AND
    ancestral-state reconstruction. `diamond` = the layout AND a marker shape (ch5:228). `...Model` =
