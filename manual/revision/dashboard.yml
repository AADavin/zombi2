  ask: Decide and then state, once, what a 'model' is versus what an 'overlay' is, and make the code select
    them consistently.
  anchor: manual/chapters/05-diversification-models.md:141-142 (§5.3 ClaDS) — but the issue is chapter-wide
    and code-wide
  status: needs-decision
  difficulty: epic
  scope: prose+code
  cross_refs:
  - C5.4 ('do we need a lot of models')
  - C5.6 (ρ misfiled under a model)
  - C5.7 (the table is the artefact)
  - C5.10 (two 'models' that are arguably one)
  - C5.11 (he assumes generalizability that does not exist yet)
  evidence: '**He is right, and it is worse in the code than in the prose.**


    WHAT IS A MODEL: a class in `zombi2/species/model.py` that (a) carries rate parameters, (b) declares
    a `SpeciesCaps` class attribute, (c) has `validate()`, and (d) EITHER has `sample_internal_age(u,
    A)` (backward-capable: BirthDeath, EpisodicBirthDeath) OR is grown by a registered Gillespie view
    (`_GILLESPIE_VIEWS`, forward.py:305-306: ClaDS→_ClaDSView, DiversityDependent→_DDView, CladeShiftBirthDeath→_ShiftView,
    BirthDeath→_SharedView). There are 5 real classes + 2 presets (Yule = BirthDeath(μ=0); SharedBirthDeath
    = deprecated preset for `per=''shared''`).


    WHAT IS AN OVERLAY: **nothing formal. There is no overlay object.** Overlays are plain `__init__`
    kwargs, duplicated by hand on every class that wants them: `sampling_fraction` appears 5×, `mass_extinctions`
    5× (each calling the same `_normalize_mass_extinctions` helper, model.py:35), `fossilization`/`removal`
    2×. `_caps.py:24-46` defines a `Feature` dataclass — but only for `forward_only_features`, i.e. only
    to know what to REJECT in backward mode. There is no composition machinery; ''overlay'' is a manual
    word for ''kwarg some classes happen to accept''.


    COMPOSITION IS AD-HOC, NOT UNIFORM. Verified: `sampling_fraction` and `mass_extinctions` ARE uniform
    (all 5 classes, applied in shared code — `_finalize_present` forward.py:182, `_cull` forward.py:330).
    `fossilization`/`removal` are NOT: `ClaDS(1.0, fossilization=0.3)` raises **TypeError: unexpected
    keyword argument** (verified at runtime), not a modelling error. So one ''overlay'' composes with
    2 of 5 models and fails with a Python-level error, not a domain error.


    THE CLI IS THE SMOKING GUN — four mechanisms select one thing:

    1. by VALUE: `--diversification {constant,clads,diversity-dependent,shared}` (cli/species.py:38-43)

    2. by ARITY: episodic is entered iff `len(--birth)>1 or len(--death)>1 or --shifts` (cli/species.py:144,
    `episodic = args.shifts is not None or len(args.birth) > 1 ...`) — EpisodicBirthDeath is a first-class
    model that is NOT on `--diversification`

    3. by PRESENCE: `--clade-shift` (cli/species.py:142) — CladeShiftBirthDeath is also NOT on `--diversification`

    4. by KNOB: `--per {lineage,shared}` (cli/species.py:44), an orthogonal ''opportunity'' axis that
    only composes with `constant` (cli/species.py:133-135 errors otherwise)

    And the mutual exclusions are hand-written errors, not a grid: cli/species.py:138-140 (''--clade-shift
    ... does not combine with --diversification clads/diversity-dependent''), :183-185 (''--fossilization
    / --removal are not supported by --diversification {clads,dd}''), :169-170 (''--clade-shift does not
    combine with --per shared'').


    So Adrián''s question ''are we discussing different models, or things you can combine, or different
    categories?'' has the honest answer: **all three at once, with no marker telling you which is which.**'
  recommendation: 'This is the chapter''s real work and it is code, not prose. My proposed ontology, three
    nouns, stated once and enforced:

    1. **Process** — how λ and μ are generated. Mutually exclusive, exactly one per run: `constant | episodic
    | clads | diversity-dependent | clade-shift`. All five go on `--diversification` (fixes mechanisms
    2 and 3 above: episodic and clade-shift stop being selected by flag arity/presence).

    2. **Opportunity** — `per={lineage,shared}`. Already a named axis with a design doc; keep it, but
    state in the table that it currently composes only with `constant`.

    3. **Overlay** — an observation/perturbation layer that does not change how λ,μ are generated: `sampling_fraction`
    (ρ), `mass_extinctions`, `fossilization`+`removal` (ψ,r). These should be UNIFORM across every process.
    Two of the three already are; make fossilization the third (it is a rate on the Gillespie loop exactly
    as on the thinning loop — forward.py:168-175 is ~8 lines that `_grow_gillespie` simply never got).

    Then the chapter reorganises itself: §Processes (one per model), §Overlays (one per overlay, applying
    to all), §Capability table (C5.7, generated from `_caps`). This also answers C5.4 (''do we need a
    lot of models?'' — yes, five processes; no, not five ways of choosing them) and C5.6 (ρ moves to §Overlays).

    COST, honestly: the prose is ~1 day. The code to make it TRUE — fossilization on the Gillespie engine
    + unify CLI selection + a compose-ability grid replacing the hand-written errors — is epic, ~1-2 weeks,
    and touches `_caps.py`, `model.py`, `forward.py`, `cli/species.py`. **Do not write the prose first**:
    if you document a clean ontology the code doesn''t have, you have moved the lie rather than fixed
    it. Recommended interim: ship the C5.7 table with the ad-hoc reality shown honestly (including the
    TypeError cells), and schedule the unification as its own piece of work.'
  outcome: null
  blocked_by:
  - D5
