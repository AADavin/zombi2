- id: C2.8
  chapter: '2'
  kind: FQ
  verbatim: 'FQ: ZOMBI(1) had a lot of clarity. 3 levels, sequential. Species, genomes and sequences.
    For ZOMBI2 the diamond does not have the same level of clarity. I do wonder if keep the 3 tiers structure
    of ZOMBI(1) would be a good idea, with trait as a secondary rung. It probably is not, but I am just
