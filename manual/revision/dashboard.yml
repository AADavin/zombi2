  the source; `per="site"` is documented in Chapter 2 and raises ValueError. Second, and you must know
  this before we start: four of your biggest asks reverse decisions you ratified two and three days ago
  (the ch4/ch5 split, the by-target coevolution cut, the diamond, "resolution"), and your S,G,Σ,T convention
  contradicts both the shipped part order and your own C11.1 — I think you should reverse three of the
  four, but knowingly, not by accident. Practically: **Chapter 2 is the bottleneck.** It owns the vocabulary
  every other chapter quotes, its rate section is the one you flagged hardest, and no chapter downstream
  can be rewritten until it is settled.'
