  evidence: 'His premise about the module is WRONG, and it matters. There is NO `results` module anywhere
    in the package: `find zombi2 -name "*result*"` returns nothing. TraitResult is defined at zombi2/traits/models.py:1064
    and re-exported from zombi2/traits/__init__.py:27 — it already lives in traits. So if he means ''the
    class is in the wrong file'', it is already done. The real, defensible reading of his comment is the
    SHAPE, and there the asymmetry is real. Verified inventory of what each level''s driver returns: (S)
    simulate_species_tree (zombi2/species/sim.py:48) -> `Tree` (zombi2/tree.py:54) — a clean noun, the
    thing itself. (G) simulate_genomes (zombi2/genomes/simulation.py:597) -> THREE different types depending
    on `output=`: `Genomes` (simulation.py:260, docstring literally ''Result of simulate_genomes''), `ProfileMatrix`
    (profiles.py:38), or `GenomeTrace` (simulation.py:494); plus an engine-level `GenomeResult` (genomes/genome_sim.py:33)
    and a separate `NucleotideResult` (nucleotide_sim.py:67) for the nucleotide model. There is NO `Genome`-the-result
    object: `Genome` is a per-species genome, and `Genomes` is a container. (T) simulate_traits -> `TraitResult`;
    simulate_biogeography (biogeography.py:159) -> also `TraitResult`. (Sigma) there is NO `simulate_sequences`
    free function at all: the surface is `SequenceEvolution(...).scale()` -> `GenePhylograms` (sequences/evolution.py:43),
    `evolve_on_tree(...)` -> a bare `dict {gid: sequence}` (sequences/models.py:434-437), and a `NucleotideResult.simulate_sequences()`
    method (nucleotide_sim.py:366). So the four conventions are: bare noun (Tree), plural container (Genomes/GenePhylograms),
    <Level>Result (TraitResult/GenomeResult/NucleotideResult), and raw dict. CRITICAL CROSS-REF: this
    exact question was already analysed and DEFERRED in docs/design/naming-consolidation.md:354-363 ("C-defer
    — Result-type regularisation"), which names the same four conventions, calls it "real but low-traffic",
