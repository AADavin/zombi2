    THERE, but there is one specific, fatal, and cheap-to-fix omission. WHAT EXISTS: `ChromosomeEvent(event,
    branch, time, parents, children)` (events.py:209-220) is explicitly designed for this — its docstring
    says ''recorded with the source and resulting chromosome ids so a karyotype genealogy can be reconstructed''.
    It is a parallel stream on `EventLog.chromosome_records` (events.py:232), written to `karyotype_trace.tsv`
    as `time/event/branch/parents/children` (cli/genomes.py:698-703, simulation.py:486-490). `chrom_id`
    is minted from its own id space (`IdManager.new_chromosome`, genome.py:53), separate from genes. I
    ran an 8-tip sim with fission=fusion=0.3, chromosome_origination=0.1, chromosome_loss=0.05 and got
    13 tier events, e.g. `FISSION branch=i1 parents=(6,) children=(6,10)`, `FUSION branch=i6 parents=(14,15)
    children=(14,)`, `CO parents=() children=(11,)`, `CL parents=(7,) children=()`. So births, deaths
    and times are all recorded. WHAT IS MISSING — THE BLOCKER: **speciation is not recorded for chromosomes.**
    For genes, `GenomeSimulator._speciate` (genome_sim.py:234-247) logs `EventRecord(SPECIATION, node,
    time, [GeneOp(old,''parent''), GeneOp(new1,''child''), GeneOp(new2,''child'')])` for every gene —
    that parent->two-children remint record is precisely what makes `build_gene_trees` (reconciliation.py:132)
    possible. `OrderedGenome.clone_reminting` (genome.py:801-811) mints fresh chrom_ids for each daughter
    (via `type(self)(..., n_chromosomes=len(self.chromosomes))`) and knows the correspondence (the `zip(self.chromosomes.values(),
    new.chromosomes.values())` at line 805) but RETURNS ONLY THE GENE MAPPING AND THROWS THE CHROMOSOME
    MAPPING AWAY. I confirmed the consequence empirically: leaf chrom_id sets are pairwise disjoint (n7=[20,21],
    n2=[25,27,32,33], n6=[34,35,36], n1=[40,41,42]) and nothing in `chromosome_records` links id 21 to
    any ancestor. So today the chromosome genealogy is reconstructible WITHIN a branch and severed at
    every node. TWO SEMANTIC PROBLEMS BEYOND THAT: (1) FISSION IS BUDDING, NOT BIFURCATION — `parents=(6,)
    children=(6,10)`, the source KEEPS its id (genome.py:823-845). Genes do the opposite at duplication
    (both copies get fresh gids), which is what makes a gene tree a proper bifurcating tree. A chromosome
    ''tree'' built as-is would have degree-2 pass-through nodes, not splits. (2) FUSION IS RETICULATION
    — `parents=(14,15) children=(14,)`, two lineages MERGE. Gene families have no such event. This is
    not a tree; it is a network (or, if you insist on a tree, you arbitrarily pick one parent and record
    the other edge as a hybridization-like annotation). This is the genuinely hard, genuinely novel part
    and it is a modelling decision, not an implementation detail.'
  recommendation: 'Real opinion: worth doing, in two clearly separated stages, and it should go in the
    notes/design file (manual/REVISION_NOTES.md or a new docs/design/chromosome-genealogy.md), NOT in
    the manual, because the manual must not promise it. STAGE 1 (small, ~half a day, do it soon regardless):
    make `clone_reminting` also return the chromosome mapping and have `_speciate` log a `ChromosomeEvent(SPECIATION,
    node, time, parents=(pcid,), children=(ncid1, ncid2))`. This is safe — chrom ids come from their own
    counter and no rng draw is involved, so BYTE-IDENTITY of every existing seeded run is preserved (the
    very property `ChromosomeTierMixin`''s RNG contract docstring, genome.py:450-454, is built to protect).
    Without this the feature is structurally impossible; with it, `karyotype_trace.tsv` becomes a complete
    genealogy. It touches `Genome.clone_reminting`''s signature in three classes (Unordered/Ordered/Nucleotide),
    which is the only reason it is not trivial. STAGE 2 (medium-to-large): a `build_chromosome_trees()`
    mirroring `build_gene_trees` (reconciliation.py is only 482 lines and the node-walk machinery is directly
    reusable — a chromosome lineage has a birth, a death and a branch, exactly like a gid). Blocked on
    the two semantics decisions below. My call: remint BOTH children at fission (match the gene/duplication
    convention — then fission is a clean bifurcation and the tree is a real tree), and treat fusion as
    a reticulation, i.e. ship a chromosome NETWORK and be honest that it is one. Fusion-as-merge is genuinely
    interesting scientifically (it is the karyotype analogue of hybridization) and pretending it is a
    tree would be the kind of thing that gets the manual criticised. Note also that chromosome origination
    gives each new replicon its own root, so the output is a FOREST of chromosome trees, one per ''chromosome
    family'' — the analogy to gene families that Adrián drew is exact, and it survives all the way down.'
  outcome: null
  blocked_by: []
