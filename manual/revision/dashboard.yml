- id: C11.5
  chapter: '11'
  kind: GC
  verbatim: 11.2 I need to spend some time understanding DEC because I can't believe that everything fit
    into discrete or continous and then you have an ad-hoc category for this thing
  ask: 'Justify or fix the "range" row in the model table: is DEC really a third kind, or a discrete model
    in disguise?'
  anchor: manual/chapters/11-trait-evolution.md:75 ("| `DEC` | range | geographic-range evolution ...
    |") in §11.2 "Trait models at a glance"
  status: actionable
  difficulty: small
  scope: prose
  cross_refs:
  - C11.4
  - §11.7 Historical biogeography
  evidence: 'He is right, and the code proves it: DEC is NOT a third kind. zombi2/traits/biogeography.py:36
    — `class DEC(Mk)`. It literally subclasses Mk, builds a k x k rate matrix Q over the enumerated non-empty
    area subsets (biogeography.py:87-103) and calls `super().__init__(Q, states=states, root=root)` at
    line 114. simulate_biogeography returns `TraitResult(..., kind="discrete")` (biogeography.py:207-208).
    Its own module docstring says the anagenetic part is a CTMC over range states "exactly like Mk" (line
    8-9). So the table''s Kind column is mixing two different axes: for every other row ''Kind'' means
    HOW A BRANCH IS TRAVERSED (continuous = one Normal draw / discrete = simulate the jumps), but for
    DEC ''range'' describes the STATE SPACE. By the column''s own meaning DEC is discrete. What is genuinely
    special about DEC is two things, neither of which is a ''kind'': (a) its state space is the subset
    lattice of areas rather than a flat list, and (b) it has a NODE process — at each speciation the ancestral
    range is divided between daughters (DEC.cladogenesis, biogeography.py:132-153), which is why it needs
    simulate_biogeography rather than simulate_traits. AND EVEN (b) IS NO LONGER UNIQUE: simulate_traits
    now takes a `cladogenesis=Cladogenesis(...)` kernel (models.py:1198, 1218-1221) that jumps a trait
    at each speciation. The real difference is subtler: Cladogenesis jumps the value, whereas DEC''s node
    process gives the two daughters DIFFERENT states drawn jointly from the parent''s range (vicariance/subset
    sympatry). Note also that Cladogenesis is exported from zombi2.traits (__init__.py:26) but is never
    mentioned in Ch11 — it surfaces only in Ch16.'
  recommendation: 'Answer him honestly in the manual instead of defending the third category. Change the
    DEC row''s Kind to `discrete` and let the ''What it captures'' cell carry the difference: ''geographic
    range (a subset of areas) — a discrete chain over the subset lattice, plus a range split at each speciation''.
    Then add two sentences to §11.7 saying exactly what I found: DEC IS an Mk chain (it subclasses Mk
    in the code); the state space is the lattice of ranges; the only reason it has its own driver is the
    cladogenetic split, because at a speciation the daughters take different ranges, which no anagenetic
    driver can express. That reframes DEC from ''an exception we bolted on'' to ''the discrete model plus
    one node rule'', which is both true and much more elegant. Optional and better: if the Kind column
    is going to carry two axes, make it two columns (branch process: continuous/discrete; node process:
    none/cladogenetic) — that also gives Cladogenesis and MultiOptimumOU an honest home in the table.'
  outcome: null
  blocked_by: []
