- id: D10
  slug: figure-conventions
  title: G on the left, no subtitles, and what Figure 2.1 is FOR
  question: 'Three figure rules: does G go on the left everywhere; do we enforce the existing no-subtitle
    rule; and once Fig 2.1 loses its annotations and gains arrows, what does it mean that Fig 14.1 does
    not?'
  severity: major
  scope: prose+figures
  status: decided
  decision: 'Figure layout: GENOME LEFT, TRAIT RIGHT (Species top, Sequence bottom). Enforce STYLE.md:19
    ''no subtitle''. Fig 2.1 = topology; the joint figure = same with model names on edges. Fix the dominant-baseline
    rsvg bug once with a centred_text helper (closes C11.7/C11.8). Hoist NODE_COL into zombi_style.py.
    The approved composition figures already use Genome-left.'
  decided_on: '2026-07-17'
  why_it_gates: It gates C2.5, C2.7, C4.6, C6.11, C11.7, C14.12 and CGLOBAL.3 — and C2.5 and C2.7 are
    two halves of one figure plan that will come out incoherent if done separately.
  options:
  - label: G-left everywhere; enforce STYLE.md's no-subtitle rule; Fig 2.1 = what can influence what (topology
      only, no model names, single-headed, closed by adding T→Σ); Fig 14.1 = the same topology with the
      coupling model names on the edges
    pros: Splits the two figures by LABELLING rather than topology, which is what your C2.5 asks for once
      followed through. Keeps Fig 2.1 a pipeline figure (its own caption says it is) instead of duplicating
      Fig 14.1. Adding T→Σ is honest — `sequences --couple traits:selection` ships.
    cons: Makes C2.7's three-example figure necessary rather than optional, because the hierarchical meaning
      Fig 2.1 gives up has to land somewhere.
    cost: Swap coords in `fig_levels_diamond.py:81-82` and `fig_coevolve_modes4.py:130-131`, mirror web/index.html's
      inline SVG, add one arrow, delete 3 subtitles, `make figures`. ~1.5h + arrow-label re-nudging (they
      are hand-tuned to the current side).
  - label: 'Copy web/index.html''s version literally: double-headed S↔T, S↔G, T↔G; single-headed into
      Σ'
    pros: Closes the shape and matches a shipped surface.
    cons: Fig 2.1 stops being a pipeline figure and becomes a near-duplicate of Fig 14.1, contradicting
      its own caption.
    cost: Same.
  - label: Fix only the two figures you flagged for off-centre text (11.6, 11.7)
    pros: Minimal.
    cons: Leaves the bug live in 45 other scripts and lets it regress.
    cost: ~30 min, wasted.
  recommendation: 'Option 1. Three findings you should have before deciding. (1) **G is on the wrong side
    in 3 of 4 level figures**, and the one that obeys you is the one WITHOUT arrowheads: `fig_levels_diamond.py:81-82`
    places T left / G right; `fig_coevolve_modes4.py:130-131` the same; `web/index.html` the same; only
    `docs/img/four_levels.svg` has G left — and it draws dashed connectors with no heads. So your ask
    to "follow the website figure" is really a *merge* of two mutually inconsistent sources, and the docs
    home and the manual currently show MIRRORED versions of the same diagram. (2) **The no-subtitle rule
    is already ratified** — `figures/STYLE.md:19` says "No subtitle." — and exactly THREE figures violate
    it: Fig 2.1, Fig 2.2 and Fig 14.1, i.e. the three newest conceptual diagrams and the three you complained
    about. The other ~60 obey. So C2.5''s subtitle ask needs no decision at all; it is enforcement. (3)
    **C11.7/C11.8 is not two sloppy figures, it is one systemic renderer bug**: `rsvg-convert` (the manual''s
    PDF converter, `manual/Makefile:55`) silently ignores `dominant-baseline`, which 47 scripts and 107
    call sites rely on. I tested it — the same SVG centres correctly in a browser and in cairosvg, and
    sits high in rsvg. That is why you only see it in the PDF and why it survived review. Fix it ONCE
    with a `centred_text` helper in `zombi_style.py` (drawsvg 2.4.0 has `center=True`), which closes both
    comments and improves Figs 2.1 and 14.1 for free — then record it in STYLE.md or it regresses. Two
    more preconditions worth folding in: hoist `NODE_COL` into `zombi_style.py` (it is copy-pasted into
    three scripts today, so C2.7''s "reuse the level colours" has no shared symbol to reuse), and delete
    the dead `fig_coevolve_modes.py` + `docs/img/coevolve_modes.svg`, referenced by no chapter and still
    saying `genes`.'
  blocks:
  - C2.5
  - C2.7
