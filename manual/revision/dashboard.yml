    →\", but the right-hand side is a target-VARIABLE, not a level. Ch14:87-91 tabulates these under the\
    \ same \"`sequence --couple`\" heading.\nSo `traits:species` and `traits:selection` are the same syntax\
    \ with different right-hand-side types, and neither matches the sentence's colon.\n\nThe collision\
    \ is on ONE PAGE: ch14:27 prints `driver → target-variable : response` and ch14:60's figure caption\
    \ prints \"selected with `--couple driver:target`\" 33 lines later. A careful reader hits both inside\
    \ a minute — which is exactly what happened to him.\n\nSecond, related finding while I was in there:\
