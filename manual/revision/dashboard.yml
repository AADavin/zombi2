    is a word the software has never heard of.** `grep -rni propensity zombi2/ rust/src/` returns **zero
    hits**. It appears in the manual exactly twice (:65, :67) and is never defined. Worse, the code''s
    actual name for that quantity is right there: `zombi2/species/forward.py:376` computes `total_rate
    = math.fsum(totals)` and draws `rng.exponential(1.0 / total_rate)`. The manual invented a word for
    a variable that already has one. (3) **The manual and the published docs write the same equation with
    different left-hand sides.** 02:67 says `propensity = base × opportunity × modifiers`; `docs/guide/rates.md:29`
    says "**rate = base × opportunities × modifiers**". Same identity, two names, both shipped (docs also
    flips to plural "opportunities" throughout, vs the manual''s singular). `docs/design/opportunity.md:17`
    sides with the manual. So he did not misread the chapter: it genuinely says "everything is a rate"
    (:53), then silently renames the product to "propensity" (:65) while *also* calling the left factor
    a rate (:69-70, "The **base** carries the units — it is a rate"). "Rate" ends up meaning two things
    and "propensity" a third. Figure 2.2 is fully entangled: `docs/img/rate_clocks.svg` uses "clock" **8
    times** (title "How rates work: how many clocks, how fast", subtitle, and every panel caption: "one
    clock on each lineage", "one clock on each gene copy", "one clock for the whole thing", "one clock
    per lineage (or per copy) -> EXPONENTIAL", "one shared clock -> LINEAR").'
  recommendation: 'Agreed that this needs a session with him, so my job here is to make that session short.
    **Three coherent options, pick one:**


    **Option 1 — RATE ONLY (my recommendation).** One word, `rate`, throughout. The identity becomes **`total
    rate = base rate × opportunity × modifiers`**. *base rate* = the number you set (`time⁻¹`, the only
    thing carrying units); *opportunity* = the dimensionless count, the answer to "per what?"; *modifier*
    = a dimensionless context multiplier; *total rate* = the product, the thing the sampler draws from.
    "Propensity" is deleted from the manual and survives only as one parenthetical gloss in Appendix A
    where Gillespie is taught, since it is his word. "Clock" is deleted from §2.3 entirely and reserved
    for Chapter 13''s molecular clocks, where the API owns it. Why this one: it is the only option that
    simultaneously (a) matches the already-published docs/guide/rates.md:29 headline ("rate = base × opportunities
    × modifiers"), so nothing has to be un-shipped, (b) matches the source — the manual would name the
    quantity `total_rate` exactly as `zombi2/species/forward.py:376` names it, and (c) directly answers
    his complaint that "the term rate disappears". It never disappears.


    **Option 2 — PROPENSITY, DEFINED ONCE.** Keep "propensity" but define it at first use as "the total
    rate at which an event fires right now, given the current state", and reserve "rate" strictly for
    the base parameter. Chemically standard, and Appendix A already teaches Gillespie. Costs: docs/guide/rates.md
    must change its headline equation, and it fights the user''s mental model, since every CLI flag (`--dup`,
    `--birth`, `--rate-per`) says "rate".


    **Option 3 — BASE vs EFFECTIVE.** `effective rate = base rate × opportunity × modifiers`. Plain and
    readable; "effective" is a word biologists are comfortable with. Risk: "effective" is pre-loaded in
    this field (effective population size), and it invites "effective for whom?".


    **The cost he should know about before choosing Option 1:** "how many clocks, how fast" is a house
    slogan — it is the §2.3 title, the Figure 2.2 title, and the name of an internal design thread. Option
    1 kills it. The replacement I would offer is **"per what, and how fast"**, which is arguably better
    because "per what?" is already what docs/guide/rates.md:47 calls "the single most clarifying question
    you can ask about any rate", and because it names the `per=` knob the code actually exposes (`BirthDeath(per=...)`,
    `Rates(per=...)`, `--rate-per`, verified at zombi2/cli/genomes.py:36). The slogan would then match
    the API keyword letter for letter. **Do not start the rewrite before that session.** Also flag for
    the session: the deprecated-alias sentence at :139 ("The older preset classes (`SharedBirthDeath`,
    `PerCopyRates`, `PerLineageRates`) still work as friendly shorthands") is accurate — zombi2/species/model.py:411
    does emit the deprecation warning — but a chapter-2 tour is the wrong place to advertise deprecated
    API.'
