contradictions:
- between:
  - 'Your global convention: ''The four levels are Species Tree (S), Genomes (G), Sequences (Σ), Traits
    (T), IN THAT ORDER'''
  - 'C11.1: ''I said traits should go after sequences. I am not sure anymore... that fact would push to
    the direction of keep this order (explain traits after genomes)'''
  - 'The shipped part order: II Species trees → III Genomes → IV Traits → V Sequence evolution'
  explanation: 'Your brief states S, G, Σ, T as a global convention. C11.1 then reconsiders and leans
    the opposite way, toward keeping Traits before Sequences. And the book itself ships S, G, T, Σ: `\part{Traits}`
    is at 11-trait-evolution.md:2 and `\part{Sequence evolution}` is at 12-sequence-evolution.md:2. All
    three cannot hold. Note also that C11.1''s memory is not borne out — the ratified note (REVISION_NOTES.md:52)
    says only ''Sequences go BEFORE coevolution'', never before Traits.'
  resolution: 'Decide D2 in the structure session, before anything is written. My recommendation is S,
    G, Σ, T with the Traits part moving after Sequences, because S → G → Σ is the real dependency chain
    and the move is provably safe (grep ''trait'' over ch12 and ch13 returns ZERO hits; ch11 mentions
    sequences once). But the decisive fact is neutral between the options: **your stated order currently
    occurs zero times in the repository** — I counted every four-level enumeration across manual/, docs/,
    web/, zombi2/ and README. There is nothing to preserve. Two different WRONG orders coexist instead:
    S,G,T,Σ in ch1:33, ch2:146, the live --version banner (cli/framework.py:49) and CITATION.cff:3; and
    S,T,G,Σ in ch14:51-55 and grammar.py:52. Pick one and make it greppable.'
