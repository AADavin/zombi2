    says ''Prune a complete tree to a reconstructed one'' while the parameter is `keep="extant"` — the
    split-brain is visible inside ONE function.


    (4) OUTPUT FILENAMES = the breaking surface. Every pair is _complete/_extant: `species_tree.nwk` +
    `species_tree_extant.nwk` (cli/species.py:257,265); `reconciled_complete.nwk` + `reconciled_extant.nwk`
