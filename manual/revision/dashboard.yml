- id: C7.8
  chapter: '7'
  kind: FQ
  verbatim: 7.3. There is a class called TransferModel. Is this a part of what?
  ask: Explain where TransferModel sits in the ontology — what kind of object is it, and what is it a
    part of?
  anchor: 'manual/chapters/07-unordered-genomes.md:154-169 (§7.3 ''Transfers''); code: zombi2/genomes/transfers.py:12-74'
  status: needs-decision
  difficulty: small
  scope: prose+code
  cross_refs:
  - C7.6 (emission/receptivity live on this seam)
  - C14 (ontology of levels/tiers)
  evidence: 'WHAT IT IS. `TransferModel` is a **mechanics object**: a plain dataclass (transfers.py:12-13)
    holding `replacement`, `distance_decay`, `allow_self`, `receptivity`, `pair`. It is not a rate model,
    has no `event_weights`, does not subclass `RateModel`. It is passed to the simulator as a separate
    argument (`simulate_genomes(..., transfers=TransferModel(...))`, simulation.py:607) and consulted
    only AFTER a transfer has already fired, to answer ''who receives, and does it add or overwrite''.
    Its module docstring states the split cleanly (transfers.py:3-4): ''Rates say *how often* a transfer
    happens (the rate model); this object says *what a transfer does* once it fires. Kept separate so
    the two concerns compose freely.'' The manual already says this at lines 155-156, and says it well.
    IS IT COHERENT WITH THE ONTOLOGY? Partly. GOOD: it is not a one-off. There is a real, consistent two-object
    pattern — `Rates` says *how often*, a mechanics object says *what happens*: `TransferModel` (`transfers=`)
    and `ConversionModel` (`conversions=`) are exact siblings, and the manual notices this at lines 246-247
    (''a `ConversionModel` sets *what a conversion does* once it fires ... exactly as a `TransferModel`
    does for transfers''). The pattern is real; it is just never NAMED — which I think is precisely why
    he asks ''a part of what?'': there is no noun for the category. BAD, and this is the ontology finding:
    the `...Model` suffix carries at least three unrelated meanings across `zombi2.__all__` = [''RateModel'',''Rates'',''FamilySampledRates'',''LineageRates'',''ModifiedRates'',''TransferModel'',''ConversionModel'',''TraitGeneRates'',''SubstitutionModel'',''GammaRates'',''CodonSiteModel'',''ThresholdModel'']
    (verified at runtime). `RateModel` = abstract base for how-often; `TransferModel`/`ConversionModel`
    = what-happens mechanics; `SubstitutionModel` = a how-often process model (the opposite category);
    `ThresholdModel` = a trait evolution model. So ''...Model'' means ''a class in this library'', i.e.
    nothing. Also note the kwarg wobble: the argument is `transfers=` (plural) but the class is `TransferModel`
    (singular); same for `conversions=`/`ConversionModel`.'
  recommendation: 'Answer him in the manual with one named category, and raise the wider suffix question
    separately. (1) Prose, now (small): open §7.3 by naming the pattern — ''Every event in ZOMBI2 is described
    twice: a **rate model** says how often it fires, and, where the event has choices to make, a **mechanics
    model** says what it does when it does. `TransferModel` is the mechanics of a transfer; `ConversionModel`
    is the mechanics of a conversion. They are the only two, because duplication, loss and origination
    have no choices to make.'' That last clause is the actual answer to ''a part of what?'', and it is
    verifiable — no other event type has a mechanics object. If §7.4 then references the category by name,
    the two sections lock together. (2) The suffix question is his call and is book-wide, not chapter-7-sized
    — see the `ontology:model-suffix` decision. My recommendation there is doc-only: define the categories
