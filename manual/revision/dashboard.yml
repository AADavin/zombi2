- id: C12.3
  chapter: '12'
  kind: GC
  verbatim: 'This might be more a reflection of my own confusion than a real concern but, do we need "at
    all", the clocks modifying the gene tree shapes? The logical thing would not be modifying the models
    that run into the gene trees to produce the phylograms. Well, I guess that''s what we are doing, maybe
