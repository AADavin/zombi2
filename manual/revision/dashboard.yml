  status: needs-decision
  difficulty: epic
  scope: prose+code
  cross_refs:
  - C14.6
  - C14.16
  - C14.1
  evidence: 'THE SPLIT IS REAL. `zombi2 coevolve --couple` handles six edges (`cli/coevolve.py:242`);
    `zombi2 sequences --couple` handles three (`cli/sequences.py:139-140`), built by `_build_sequence_coupling`
    (`cli/sequences.py:222-257`) into `sequence_bridge.py`''s `DriverClock` / `OmegaSelector` / `GeneEventOmega`.
    WHY IT IS SPLIT — the reason is better than the manual''s: a sequence coupling needs a genome run''s
    gene trees. `zombi2 sequences --genomes DIR` replays a written event trace (ch17:19-23 shows the required
    two-step). `coevolve` neither produces nor consumes gene trees. To unify, `coevolve` would have to
    absorb the entire `sequences` surface (`--subst-model`, `--clock`, `--family-speed`, the whole codon-model
    group). That is a bad trade. VERDICT: I would NOT unify, and I think he is objecting to the wrong
    thing — but he is objecting to something REAL. The genuine inelegance is not the two commands, it
    is that the same flag name means two different things (C14.6): `coevolve --couple traits:species`
    = driver:LEVEL; `sequences --couple traits:selection` = driver:VARIABLE. That is the defect. THE INTERESTING
    REFRAME: the split only looks arbitrary because the rule is unstated. State it and it becomes a principle
    — "a coupling is declared on the command that simulates its target." Then `sequences --couple traits:selection`
    is not an exception, it is the rule, and `coevolve` is the odd one (the only command that simulates
    several levels at once). Push that all the way and you get the elegant answer: overlay couplings live
    on the TARGET''s own command (`traits --couple genomes:traits`, `genomes --couple traits:genomes`,
    `sequences --couple traits:selection`), and `coevolve` shrinks to what only it can do — the FUSED
    models (into-S, and the traits↔genomes loop). That aligns the CLI exactly with C14.3''s conditioned/fused
    split and would make C14.1''s Option A natural instead of awkward.'
