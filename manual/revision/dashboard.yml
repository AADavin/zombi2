- id: D6
  slug: complete-vs-reconstructed
  title: One name for the pruned tree
  question: Prose says "reconstructed" for species trees (ch4) and "extant" for gene trees (ch8), for
    the identical prune operation. Which vocabulary wins, and do the output filenames move?
  severity: major
  scope: prose+code
  status: decided
  decision: 'COMPLETE / EXTANT everywhere, prose AND code, and FREEZE the filenames. ''Reconstructed''
    survives once in ch4 as the cited Nee synonym. Reason: ''reconstructed'' is needed in 3 senses (Nee''s
    pruned tree, ''we build the trees from the log'', ancestral-state reconstruction); complete/extant
    extends cleanly to gene trees. Add the bridge sentence: _extant.nwk IS the reconstructed tree (kept
    from ZOMBI1). Fix ch4:109 ''tree.leaves() # extant leaves'' (leaves() returns extinct ones too).'
  decided_on: '2026-07-17'
  why_it_gates: 'It is your FQ (C4.1 + C8.2) and it has book-wide reach: ~17 prose sites plus a decision
    about ~20 filenames and a public namedtuple field. Until the rule is stated once, ch3, ch4, ch8 and
    ch12 each re-litigate it.'
  options:
  - label: COMPLETE / EXTANT everywhere, in prose and code. "Reconstructed" survives once, in ch4, as
      the cited Nee synonym.
    pros: It is what the artefacts are already called (7 filename families, `is_extant` ×71, `prune(keep="extant")`,
      the `Reconciliation` namedtuple). It extends to gene trees, which complete/reconstructed does not.
      And the filename tier is already correct, so this option costs ZERO breaking changes.
    cons: '"Extant tree" is loose English — a tree is not extant, its tips are. You pay the literature
      debt in one cited sentence instead of in the vocabulary.'
    cost: ~17 prose sites (ch3:154-158, ch4, ch8:44-52, ch12:100,175, docs/guide/genomes.md:1109, docs/guide/sequences.md:197).
      ~4 hours. No code, no tests, no output change.
  - label: COMPLETE / RECONSTRUCTED everywhere; rename `_extant.nwk` → `_reconstructed.nwk`, `Reconciliation.extant`
      → `.reconstructed`, `prune(keep="reconstructed")`
    pros: Aligns with the field (Nee, May & Harvey 1994, already cited at ch4:22).
    cons: 'FATAL: in gene-tree land "reconstructed" means "inferred from data", and ch8''s entire thesis
      (ch8:13-15, :56-58) is that ZOMBI2 does no inference. You would also lose the word for the log→tree
      operation and have to invent a replacement verb across ~15 sites.'
    cost: BREAKING. 20+ filenames, a public namedtuple field, a `keep=` literal, ~190 test hits, every
      downstream parser, plus a deprecation window. Re-breaks ZOMBI 1 users a second time right after
      the D2 lowercase rename.
  - label: COMPLETE / RECONSTRUCTED for species trees, COMPLETE / PRUNED for gene trees; code unchanged
    pros: Each level gets the word its own literature uses.
    cons: Keeps two vocabularies for one operation, which is what you objected to. "Pruned" has no code
      anchor at all.
    cost: ~17 prose sites, same as option 1, for less coherence.
  - label: Status quo
    pros: Zero work.
    cons: '`zombi2/tree.py:119-121` contains the contradiction inside a single function: the docstring
      says "Prune a complete tree to a reconstructed one" while the parameter is `keep="extant"`.'
    cost: Zero now.
  recommendation: 'Option 1: complete / extant, everywhere, and freeze the filenames. This cuts against
    your instinct in C4.1 and against the literature, so here is the argument. **"Reconstructed" is unsalvageable
    in this codebase**, because ZOMBI2 legitimately needs the word in three senses and you cannot reserve
    it: Nee''s pruned tree (ch4:21), "we build the gene trees from the log" (ch3:142, ch8:33 — a heading),
    and ancestral-state reconstruction (ch11:31, `--write ancestral`). Meanwhile complete/extant extends
    cleanly to gene trees and complete/reconstructed does not — a loss-pruned gene tree called "reconstructed"
    would be read as an *inferred* gene tree, which is exactly the thing ZOMBI2 exists to be the ground
    truth for. That is the decisive point. One correction to your premise: your memory of "pruned" is
    not borne out — I searched and "pruned" is used almost exclusively as a VERB ("pruned to the survivors");
    I found no instance of "the pruned tree" as a noun. And note the asymmetry is a feature: `complete`
    describes the tree, `extant` describes the tips you kept, and `prune(tree, keep="extant")` already
    reads correctly. Then do the one thing that is actually missing: **add the bridge sentence** in ch4
    and at docs/guide/species-trees.md:46 — the `_extant.nwk` file IS the reconstructed tree, kept from
    ZOMBI 1. Its absence is what makes the current split read as an error rather than a convention. Fix
    ch4:109 too, independently: it says `tree.leaves()  # extant leaves` and that is wrong — `leaves()`
    returns all leaves including extinct ones (verified: 32 leaves, 14 extinct, at seed=1).'
  blocks:
  - C4.1
  - C8.2
- id: D7
  slug: chapter-template-and-outputs
  title: Two chapter genres, three canonical headings
  question: Do all chapters adopt one skeleton, which chapters are exempt, and where does the shared output-file
    table live?
  severity: major
  scope: prose-only
  status: decided
  decision: 'PART II common structure. Every level chapter teaches concept + models first, then closes
    identically: THE OBJECTS (result type + API, like ''The Tree object'') -> USAGE FROM PYTHON -> USAGE
    FROM THE CLI -> OUTPUTS. Separate Python/CLI sections ratified (resolves C12.4). Concept chapters
    (1,2) + Part III stay essays. Shared write-parts table -> Appendix B, REGENERATED from simulation.py:339
    (ch8 lists 7, there are 10). C8.1 and C10.6 do not conflict.'
  decided_on: '2026-07-17'
  why_it_gates: It shapes every chapter rewrite in Waves 3-8. Writing ch7 before the template is agreed
    means writing ch7 twice. It also settles the recap-opening rule that recurs in C9.1, C9.2, C10.1,
    C13.2 and C14.2.
  options:
  - label: 'TWO GENRES: Model chapters get a fixed skeleton (§The problem → §The model → §Usage from Python
      → §Usage from the CLI → §Outputs); Concept chapters (ch1, ch2, ch14, A1) are explicitly exempt and
      stay essays. Three canonical headings, no synonyms. Shared write-parts table lives ONCE (ch6 or
      Appendix B); each chapter''s §Outputs covers only its level''s additions.'
    pros: Gives every chapter a predictable place to look while keeping ch2 and A1 as the essays they
      are. Avoids empty sections in chapters with no CLI surface.
    cons: Two genres is a slightly more complex rule than one.
    cost: ~9 model chapters get sections added or renamed; ~1-2 days. Plus the write-parts table must
      be REGENERATED from `simulation.py:339`, not relocated — it is wrong today.
  - label: ONE RIGID TEMPLATE for all 18
    pros: Maximal consistency.
    cons: Five chapters have no CLI surface and no outputs. Forcing the sections on them produces empty
      headings, which reads as bureaucratic and is worse than the current inconsistency. It would also
      gut ch2 and A1, which are good.
    cost: Same, plus damage.
  - label: Harmonise section NAMES only; leave chapter shapes free
    pros: Cheapest.
    cons: Leaves 5 chapters burying 10-14 code blocks inline with no place to look up "how do I run this".
    cost: ~8 heading renames.
  recommendation: 'Option 1. Your premise is correct and understated: **exactly 1 chapter of 18 (ch12)
    has both a Python and a CLI section**; ''Usage from the CLI'' appears in 2 chapters while ''From the
    command line'' appears in 4 — same job, two names; and an outputs section exists in 2 chapters under
    2 names (''The output folder'' in ch3 AND ch8, documenting the same folder twice, plus ''Output''
    in ch11). That is a fossil record of the writing order, exactly as you guessed. **Tell yourself one
    thing up front: C8.1 and C10.6 do NOT conflict.** C8.1 says output should not be its own chapter;
    C10.6 says each chapter should have one output section. Both are satisfied by the same design — a
    `## Outputs` section as the last section of each chapter that writes files, plus one canonical table
    for the shared artefacts. You do not have to arbitrate. On the recap rule: mandate a recap *sentence*
    with a heading-id link, not a `## Recap` section. Ch7/9/10 already do exactly that and they are the
    best openers in the book; a dedicated section in all 18 would add ~15 pages nobody reads. And note
    the canonical table is not merely misplaced, it is **wrong**: ch8:114-115 lists 7 write-parts but
    `simulation.py:339` has TEN (adding `reconciliations`, `layout`, `karyotype`), and ch8:102-103''s
    claim that "every other component is opt-in" contradicts `simulation.py:374`. That is the empirical
    argument against copies.'
  blocks:
