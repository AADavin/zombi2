    with traits as a secondary rung.
  anchor: manual/chapters/02-a-tour-of-zombi2.md:8-26 (§2.1), and by implication the whole book's framing
  status: needs-decision
  difficulty: epic
  scope: structure
  cross_refs:
  - C2.3 (his own "traits can affect any level" is this FQ in miniature)
  - C2.5 (the figure encodes whichever answer)
  - C2.4/C2.9
  - 'global: four levels in order S, G, Σ, T'
  evidence: '**His instinct is better supported by the code than he thinks, but his proposed fix mislabels
    which level is secondary.** The four nodes are not peers in the source. Two asymmetries are real and
    independent. (1) *Conditioning*: `zombi2 genomes` requires `-t species_tree.nwk`; `zombi2 sequences`
    replays a genomes run''s gene trees; so S carries G carries Σ. That is exactly ZOMBI1''s spine, intact.
    Traits carry nothing below them — no level is simulated "along a trait". (2) *Driving*: Σ is a target
    only, never a driver — `zombi2/cli/coevolve.py:237` limits the coupling graph to `_COEVOLVE_NODES
    = ("species", "traits", "genomes")`, and Σ is coupled only from the sequences side (`zombi2/cli/sequences.py:139`,
    `traits:selection`). Traits, by contrast, are a first-class driver: `traits:species` (BiSSE) *grows
    the tree* (coevolve.py:262: the into-species edges "GROW" the tree). So traits are the one level that
    is off the spine yet fully able to drive; Σ is the one that is on the spine yet unable to drive anything.
    Calling traits "a secondary rung" gets the asymmetry backwards. Strongest corroboration: the shipped
    `zombi2 --help` (I ran it) already groups the commands as "Species trees" / "Gene families & sequences"
    / "Traits & coevolution" — the CLI is *already* presenting a three-tier spine with traits set apart.
    He is reading a tension the software already resolved and the manual failed to.'
  recommendation: '**Do not restructure the code or the level inventory; do restructure the framing, and
    adopt roughly his instinct with the labels corrected.** My real opinion: four levels is the honest
    *inventory* (four kinds of thing are simulated — that is a fact, not a modelling choice) but three
    tiers is the honest *architecture*. Present it as: a three-rung substrate spine, S → G → Σ, exactly
    ZOMBI1''s, with T as an overlay that hangs on the spine and can bend any rung''s rates. The slogan
    I would put in §2.1: **"three rungs of substrate, four levels of state."** That buys back all of ZOMBI1''s
    clarity (the sequential story is unchanged and still the default) at zero architectural cost, and
    it explains rather than hides why the picture is a four-node shape instead of a ladder. The one correction
    to his framing: do not call traits "secondary". If anything Σ is the secondary level — it is the leaf,
    it drives nothing, and no coupling ever originates there. Traits are not below the spine; they are
    *beside* it. Cost estimate, honestly: as a framing change confined to §2.1 plus the Fig 2.1 caption,
    this is *small*. If he wants Parts, chapter order and the website reorganised around it, it is *epic*.
    I would do the small version now and revisit.'
