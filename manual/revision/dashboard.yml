- id: D11
  slug: literature-names
  title: BiSSE / MuSSE / QuaSSE — body text or footnotes?
  question: Where do the literature acronyms appear, and do they survive in the code?
  severity: minor
  scope: prose-only
  status: decided
  decision: Literature acronyms (BiSSE/MuSSE/QuaSSE/HiSSE/ClaSSE/CID, ClaDS) -> FOOTNOTES on first use
    with citation; description leads in the body. AVOID THE ZOO OF MODELS. Keep the class names in CODE
    (field search terms). Book-wide policy, consistent with D5 + D17.
  decided_on: '2026-07-17'
  why_it_gates: You prefaced C14.15 with "I insist", so you have raised it before; it needs settling once
    as a convention binding ch5, ch11 and ch14-17, rather than being re-negotiated per chapter.
  options:
  - label: Structural description leads in the body; the literature name goes in a footnote with its citation,
      on FIRST USE only; reference pages (docs/guide) keep them freely for searchability. Keep the class
      names in the code.
    pros: Gives you what you actually want — the names become searchable aliases rather than the story
      — without losing the citations or the discoverability that makes ZOMBI2 legible as an alternative
      to diversitree/hisse.
    cons: A two-tier rule (manual vs reference docs) rather than one.
    cost: ~10 acronym mentions cut from ch14; ~3 heading rewrites in ch15. ~30 min.
  - label: Remove them from the public API too (your C15.4 instinct)
    pros: Internal tidiness.
    cons: These are the names the field greps for and they carry the citations (Maddison 2007, FitzJohn
      2012, Beaulieu 2016). `docs/design/coevolve-grammar.md:179` already RATIFIED keeping HiSSE for exactly
      this reason, so this reverses a recorded decision.
    cost: BiSSE 158 refs, QuaSSE 96, CID 96, MuSSE 82, HiSSE 78, ClaSSE 67.
  - label: Status quo
    pros: Zero work.
    cons: ch14 has TEN acronym mentions and defines NONE of them.
    cost: Zero.
  recommendation: 'Option 1, and **keep the names in the code** against your C15.4 instinct. Here is the
    honest split. Your prose complaint is right and sharper than you put it: ch14 mentions the SSE family
    **seven times before ch15 defines it**, and the acronym "SSE" is never expanded anywhere in the manual.
    `BiSSE` is first defined at ch15:30; everything in ch14 precedes it. The three worst — ch14:41''s
    `(which recovers MuSSE)` and `(which recovers QuaSSE)` — are **docstring language that leaked verbatim
    into the manual**: `grammar.py:16-18` says exactly that, and it is correct *there*, for a reader who
    already knows. It is wrong in ch14, for a reader who does not. But your book-wide premise is overstated:
    I swept every model-name parenthetical in all 18 chapters and found **3 genuinely bad ones, all in
    ch14**. `(Yule)`, `(Pagel)`, `(GTDB)` and `(IGV, JBrowse, UCSC)` are all legitimate — "Pagel''s lambda"
    IS the name of the thing. This is a ch14 fix, not a book-wide pass. On the code: removing BiSSE/MuSSE/HiSSE
    would trade away the project''s legibility to the field for internal tidiness, and I think that is
    a bad trade — but the readability you want arrives anyway via D8: once the grammar is exported and
    ch15 leads with `couple("traits", "species", "speciation", Table({0: 1, 1: 3}))` showing `BiSSE(...)`
    as the one-line shorthand underneath, the names stop being the primary story. That resolves C15.2
    and C15.4 with one move. Separately: fix ch15:29-30, which says the four variants "differ only in
    the kind of trait doing the driving" and then contradicts itself five lines later for HiSSE — HiSSE
    differs by having a hidden dimension, not a trait kind. And ch14:81 says "three responses" while ch15:29
    says "four", one page apart.'
