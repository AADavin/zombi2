- id: C12.1
  chapter: '12'
  kind: FQ
  verbatim: 'FQ: If we are going to integrate clocks into traits (and we might not!), I think this is
    the time to discuss it'
  ask: Decide whether clocks and traits are one thing, and if so say so in this chapter rather than presenting
    two unrelated model families.
  anchor: manual/chapters/12-sequence-evolution.md:59-82 (§The shared lineage clock)
  status: needs-decision
  difficulty: large
  scope: prose+code
  cross_refs:
  - Ch13 (molecular clocks) — the clock family lives there
  - Ch11 (trait evolution) — BrownianMotion/OU/Mk live there
  - Ch17 §traits:speed — a trait already drives the clock today
  - 'Ch02 §How rates work: how many clocks, how fast'
  evidence: 'VERIFIED, and the overlap is stronger than he suspects. (1) AutocorrelatedLogNormalClock
    (zombi2/sequences/clocks.py:229-258) draws R_child = R_parent · exp(N(-σ²ℓ/2, σ√ℓ)). BrownianMotion
    (zombi2/traits/models.py:86-130) draws Normal(x + trend·dt, sigma2·dt). Taking Y=log R these are the
    SAME transition kernel with sigma2=σ², trend=−σ²/2. I ran both on the same tree with the same seed:
    max abs difference between log(clock.branch_rate[n]) and trait.node_values[n] was 4.4e-16 across all
    nodes, for seeds 0, 1, 7. Not merely distributionally equal: the same RNG stream, the same preorder
    walk, bit-identical. AutocorrelatedLogNormalClock IS exp(BrownianMotion). (2) zombi2/traits/models.py:9
    already admits this in a docstring: "The engine is the same preorder walk that zombi2.sequences.clocks
    already uses". (3) RateVariation (clocks.py:333-448) is a nearest-neighbour walk on ordered bins —
    i.e. an Mk chain with a tridiagonal Q plus a bin→rate map. The traits CLI already exposes exactly
    that: `zombi2 traits --model mk --ordered` = "the adjacent-only (tridiagonal) chain" (11-trait-evolution.md:359).
    Mk.evolve already returns the (state, duration) segments RateVariation hand-rolls. (4) The bridge
    is HALF-BUILT already: zombi2/coevolve/sequence_bridge.py:32 defines DriverClock, "a molecular clock
    whose per-branch substitution rate is set by a grammar coupling" — a trait driving a clock, shipped,
    documented in Ch17 §traits:speed. Ch12 never mentions it. CORRECTIONS to the investigation brief:
    CIR is NOT an OU-like process in the sense that matters. CIRClock (clocks.py:261) is dr = θ(μ−r)dt
    + σ√r dW; OrnsteinUhlenbeck (traits/models.py:645) is dx = α(θ−x)dt + σ dW. OU drift, but state-dependent
    √r volatility — that is what keeps CIR positive and what makes OU Gaussian. They are different processes;
    no trait model in the repo is CIR. And the three uncorrelated clocks (UncorrelatedLogNormal/UncorrelatedGamma/WhiteNoise,
    clocks.py:154-226) draw i.i.d. per branch — they are not tree processes at all and CANNOT be written
    as trait models.'
  recommendation: 'The honest verdict: a PARTIAL unification, 3 of 7 clocks map cleanly (strict=constant,
    autocorrelated-lognormal=exp∘BM proven bit-identical, discrete-bin=ordered Mk), 1 needs a new trait
    model (a CIR/square-root diffusion, which traits arguably should have anyway), and 3 cannot map (the
    uncorrelated clocks are not processes along the tree). So do NOT sell it as a total unification, and
    do not rewrite the clock classes (that risks the RNG streams and every published seed). Instead take
    the elegant middle, three tiers of cost: (a) PROSE ONLY, ~2h: state the identity where the clock family
    is introduced (Ch13), with a pointer from Ch12 §The shared lineage clock, and a back-pointer from
    Ch11. One sentence does most of the work: "a clock is a trait — the rate is a continuous character
    evolving on the tree; the autocorrelated lognormal clock is geometric Brownian motion on log-rate,
    the discrete-bin clock is an ordered Mk chain." This is free elegance and I recommend it regardless
    of what else you do. (b) ADAPTER, ~1-2 days: add a generic `TraitClock(model, link=exp)` that lets
    ANY continuous trait model drive the lineage clock — this generalises the existing DriverClock, subsumes
    branch_sigma, and hands you OU/EarlyBurst/MultiOptimumOU clocks for free with no new maths. Existing
    clocks stay as they are, so no seed breaks. (c) FULL REWRITE (clocks re-expressed as trait models):
    I recommend AGAINST. It buys ~150 lines of dedup, cannot cover the uncorrelated clocks, and forces
    the Clock interface (which needs the INTEGRAL of the rate over a branch as (rate, t0, t1) segments)
    onto the trait interface (which returns branch ENDPOINTS). That integral-vs-endpoint mismatch is the
    real reason the two engines diverged, and it is not incidental. My recommendation: do (a) now in this
    chapter as he asks, and schedule (b).'
