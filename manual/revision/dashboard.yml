- id: C14.7
  chapter: '14'
  kind: GC
  verbatim: Bending. Bending is a strange choice of words. Bending a rate is a modulation, bending a state
    is a jump. Wow. We need to discuss the choice of words.
  ask: Drop the "bending" metaphor, and stop pretending a rate modulation and a state jump are the same
    operation.
  anchor: manual/chapters/14-coevolution-framework.md:32, 36-38 ("gets bent", "Bending a *rate* is a **modulation**...;
    bending a *state* is a **jump**")
  status: needs-decision
  difficulty: medium
  scope: prose+code
  cross_refs:
  - C14.1
  - C14.4
  evidence: 'His instinct is sharper than he realises — the metaphor is not just ugly, the sentence it
    supports is WRONG, and the code shows it. (a) USES: `bend*` appears at ch14:32, 36, 38, 60 (fig caption),
    140; ch17:4; `docs/guide/coevolution.md:10`; `docs/design/coevolve-grammar.md:55, 69`. Also two unrelated
    uses (`11-trait-evolution.md:304`, `docs/guide/traits.md:413`) about Pagel''s delta bending node depths
    — those are fine, leave them. (b) THE CLAIM IS FALSE. The manual says the kind is read off the TARGET:
    rate→modulation, state→jump. But `grammar.py:116 Scalar` defines BOTH `rate_multiplier` and `state_offset(driver_value)
    = strength · driver` — a CONTINUOUS shift of a state, not a jump. And that path is live: `traits.optimum`
    is `_STATE` (`grammar.py:72`), and `gene_conditioned_trait.py` targets it with a `Table` (line 30
    imports `Table`), driving a continuous OU optimum switch through `trait_bridge.py:34 walk_optimum_coupled_trait`.
    So the `genomes:traits` edge bends a STATE and is NOT a jump. (c) THE CODE DISAGREES WITH ITSELF ABOUT
    THE AXIS. `grammar.py:11-14` says the kind comes from the target; `grammar.py:183 Jump` says it is
    "the JUMP effect for an *event*-driver edge" — i.e. from the DRIVER. They coincide only because the
    two event-driver edges happen to target state variables. (d) JUMP IS NOT A RESPONSE. `Jump(Response)`
    inherits `rate_multiplier` and raises `NotImplementedError` (`grammar.py:212-213`) — a Liskov violation,
    and the clearest possible proof that Scalar/Table/Curve and Jump are two different kinds papered over
    by one base class. He spotted a code smell from the prose alone.'
  recommendation: 'Prose: delete "bend"/"bending" from ch14 and ch17; say what happens — "a coupling multiplies
    a rate" or "a coupling moves a state". Keep "modulation"/"jump" only if they earn their keep; plain
    "multiplier" and "jump at speciation" would serve better. Substance: state the axis correctly — the
    split is by DRIVER, not target. A state driver (a trait value, a gene count) acts continuously (multiplier
    on a rate, or an offset of an optimum); an EVENT driver (a speciation) acts at an instant (a jump).
    Code: make `Jump` a sibling of `Response`, not a subclass — a common `Effect` base, or just two separate
    slots in `Coupling`. That removes the NotImplementedError override. Medium (touches `grammar.py`,
    `species_bridge.py`, and `tests/test_coevolve_grammar.py`), and it is confined to a solver that is
    not on the execution path, so the blast radius is small.'
  outcome: null
  blocked_by:
  - D4
