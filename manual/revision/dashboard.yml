- id: C14.18
  chapter: '14'
  kind: TPI
  verbatim: 'The section: Directional or bidirectional — does the tree grow? Do you mean species tree?
    This is completely confusing. We have also bidirectional between gene and trait. What happens in those
    cases?'
  ask: The rule conflates "bidirectional" with "the tree grows" — they are not the same, and the trait↔gene
    case proves it.
  anchor: manual/chapters/14-coevolution-framework.md:99-109 (§14.5.1 "Directional or bidirectional —
    does the tree grow?")
  status: actionable
  difficulty: medium
  scope: prose
  cross_refs:
  - C14.13
  - C14.1
  - C14.3
  evidence: 'He has found a genuine flaw in the section''s logic, and the code proves him right. The heading
    equates "directional or bidirectional" with "does the tree grow" — but they come apart on exactly
    the case he names. `trait_gene_feedback.py:14` states it plainly: "Neither arrow points into S, so
    this is an **overlay** on a given tree" — yet lines 17-19 say the trait and the panel "cannot be simulated
    one-then-the-other; they are integrated **together**". So trait↔gene feedback IS bidirectional and
    the tree does NOT grow. The heading''s equation is false. In the code the two properties are two separate
    members: `grammar.py:456 mode` ("bidirectional" if any coupling fuses) and `grammar.py:450 grows_tree`
    (any coupling targets species). Independent by construction. The chapter knows this — it buries the
    correction in a parenthesis at lines 108-109 ("A bidirectional pair whose two edges form a cycle is
    grown together — *fused* — for the same reason"), which is the section''s most important sentence,
    in brackets, at the end. On his second point: yes, "the tree" means the species tree, and the chapter
    never says so — line 101 ("the tree is fixed — read from `-t/--tree`") and line 116 ("a sequence rides
    a *gene* tree, not the species tree") use "tree" for two different objects in one section.'
  recommendation: 'Split the conflated rule into the two independent questions the code actually has:
    (1) DOES ANYTHING FUSE? — is there a cycle? (into-S edges, or the trait↔gene loop). If yes, those
    levels are integrated together. (2) IS THE SPECIES TREE AN INPUT OR AN OUTPUT? — does any arrow point
    into S? If yes, you must give `--age`/`--tips` and no `-t`. Trait↔gene feedback answers yes to (1)
    and no to (2), which is precisely why one question cannot serve. Say "species tree" every time; never
    bare "tree" in a chapter that also discusses gene trees. Promote the parenthesis at 108-109 into the
    body. This section is the chapter''s logical core and it is currently wrong — fix it even if C14.1
    goes to Option A (it becomes the surviving chapter''s spine).'
