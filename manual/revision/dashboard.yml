- name: The manual documents the design, not the software
  description: 'The single deepest cause, and it explains why careful reading produced so many comments:
    in several places the book describes what was intended rather than what shipped. `CouplingGraph` —
    the solver ch14 teaches as ''two rules read any set of edges'' — is dead code whose OWN docstring
    says so verbatim: ''Not on the execution path yet — this solver is exercised only by its tests. Nothing
    in zombi2/cli/ or the bridges consults it'' (grammar.py:396-405); I verified it appears only in tests/.
    The same admission sits on `make_null` (grammar.py:496-501). ''Propensity'', the name ch2 gives the
    simulator''s central quantity, appears twice in the whole book and zero times in zombi2/ or rust/.
    `per="site"` is documented at ch2:82 and ch2:137 and raises ValueError. §3.1.4 points at a demo notebook:
    `find . -name ''*.ipynb''` returns nothing. Ch5''s warning says the occurrence birth–death ''is not
    yet shipped'' while docs/guide/species-trees.md:362 says skyline FBD is not implemented — and it IS,
    in the Python API, today. The grammar sentence ch14 calls ''primary'' has zero public exports. You
    were not misreading; the text was describing a future.'
