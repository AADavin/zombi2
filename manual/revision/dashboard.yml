- id: D12
  slug: em-dash-target
  title: A number for the em dashes
  question: What density, and how wide does the sweep go?
  severity: minor
  scope: prose-only
  status: decided
  decision: Em-dash target <=4 per 1,000 words across manual + docs/guide + web + README + cli help. Now
    433 in the manual = 14.2/1k. ~195 real edits (keep the '- term - gloss' bullet form + captions). Worst-density
    first (ch2 23.5, ch6 23.4). Per-site not regex. Add a make prose-lint CI gate. Not zero (ch11 at 6.8
    reads fine).
  decided_on: '2026-07-17'
  why_it_gates: Without a number this recurs as a vague note on all 18 chapters and never converges. It
    does not gate structure, but it gates whether the pass ever finishes.
  options:
  - label: ≤4 per 1,000 words across manual/chapters + docs/guide + web + README + zombi2/cli; skip docs/design
    pros: Achievable folded into the per-chapter passes. Includes the 140 dashes in `zombi2/cli/` — terminal
      help is where the tell reads worst and the strings are shortest. Excludes ~450 in internal design
      docs, which are not the standard-setting artefact.
    cons: ~195 body edits across the manual, each a judgment call.
    cost: '2-4h manual; +~2 days if docs/guide is included. Cannot be regexed: a dash between independent
      clauses wants a semicolon, one setting off an appositive wants commas, one introducing a list wants
      a colon.'
  - label: Manual chapters only
    pros: Bounded.
    cons: Leaves 1,473 in docs and 140 in shipped --help text, which readers see first.
    cost: 2-4h.
  - label: Everything including docs/design
    pros: Total consistency.
    cons: ~450 more edits in engineering docs no reader sees.
    cost: +1 day, wasted.
  - label: No hard target; just fix the worst offenders
    pros: Cheapest.
    cons: Never converges; recurs at every review.
    cost: ~1h.
  recommendation: 'Option 1, target **≤4 per 1,000 words**. The scale you should plan against: **433 in
    the manual = 14.2 per 1,000 words, roughly 5-10× normal edited academic prose**; 1,473 in docs; 864
    in the source, of which 140 are in user-visible `--help`; ~2,069 user-facing in total. Even `manual/metadata.yaml:2`,
    the book''s own subtitle, has one. But the honest number of edits is **~195, not 433**, because two
    classes should stay: the `- **term** — gloss` bullet-definition form (41 instances) is a standard
    book idiom and is not what reads as machine-written; and captions (49) are compressed by nature, where
    the dash is legitimate. **The density ranking is counter-intuitive and matters for sequencing**: by
    raw count A1 (43) and ch16 (41) look worst, but by density the offenders are ch02 (23.5), ch06 (23.4),
    ch14 (22.1) and ch17 (21.0) — exactly the four conceptual chapters a reader judges the book by. Do
    those first. One push-back I want on record: **a hard zero would make the prose worse, and would be
    its own tell.** Ch11 sits at 6.8/1k and reads fine — that is your existence proof and a realistic
    target, not zero. And one thing I would add that you did not ask for: **there is no prose lint in
    CI** (I checked all three workflows). Add a `make prose-lint` gate after the pass, or this regresses
    the moment anything is regenerated.'
  blocks:
  - CGLOBAL.5
  - C1.2
  - C2.2
  - C6.3
- id: D13
  slug: book-identity
  title: 'The cover: subtitle and how ZOMBI 1 is named'
  question: What replaces "A Simulator of Genome and Species-Tree Evolution — Concepts & Tutorial", and
    how is version 1 spelled?
  severity: minor
  scope: prose-only
  status: decided
  decision: 'Subtitle: ''Simulating the Evolution of Species, Genomes, Sequences and Traits'' - apply
    to all 3 surfaces (metadata.yaml, mkdocs.yml, web/index.html, which disagree). v1 = ''ZOMBI1'' (no
    space, Adrian''s call; differs from the earlier ''ZOMBI 1'' proposal). Sweep the 5 live forms to ZOMBI1;
    keep ''Zombi'' only in citations/URLs. ZOMBI2 vs Zombi2 already settled 61-0. Reject ''ZOMBI(1)''.
    Fix web/index.html:454,476.'
  decided_on: '2026-07-17'
  why_it_gates: The subtitle sets the frame C1.6's bullets must match, so it should be settled BEFORE
    the bullet rewrite, not after. It is also the PDF that ships on every GitHub release.
  options:
  - label: 'Subtitle: "Simulating the Evolution of Species, Genomes, Sequences and Traits"'
    pros: Fixes the undersell you identified (the current one names 2 of 5 things), contains no em dash,
      and puts the canonical S/G/Σ/T order on the cover, teaching the convention before page 1.
    cons: Longer than the current one.
    cost: '3 files: `manual/metadata.yaml:2`, `docs/index.md:72`, `.github/workflows/release.yml:198`.
      Plus `mkdocs.yml:2` and `web/index.html:6`, which currently give two MORE different answers.'
  - label: 'Subtitle: "A General Simulator of Evolutionary Histories"'
    pros: Short, claims the platform, ages well as levels are added.
    cons: Promises nothing specific; a comparative-methods reader cannot tell traits are in scope.
    cost: Same 5 files.
  - label: 'Subtitle: "From Species Trees to Sequences: A Simulator of Evolutionary Histories"'
    pros: Narrative.
    cons: Drops traits — the exact omission you are objecting to. Actively reject.
    cost: Same.
  - label: 'v1 naming: "ZOMBI 1" in prose · bare "ZOMBI" for the lineage/idea · "Zombi" only in citations
      and URLs'
    pros: Reads cleanly next to ZOMBI2 and keeps a visual family, while being honest that the published
      title is "Zombi".
    cons: Accepts that citations spell it differently from prose.
    cost: '~23 mechanical edits: 16 `ZOMBI1` → `ZOMBI 1`, 3 `ZOMBI-1`, 1 `ZOMBI‑1` (a U+2011 non-breaking
      hyphen at docs/design/swenson-test-port.md:12), plus aligning docs/comparison.md:1''s H1 with the
      mkdocs nav label.'
  recommendation: 'Subtitle: **"Simulating the Evolution of Species, Genomes, Sequences and Traits"**.
    Your C1.1 premise is correct and verifiable — `zombi2/__init__.py` exports four level families plus
    a whole `zombi2.coevolve` namespace, and the current subtitle names two of five things. Apply it to
    all THREE surfaces, which today give three different answers (`manual/metadata.yaml:2`, `mkdocs.yml:2`,
    `web/index.html:6`) and all three undersell. **Branding: stop spending attention on ZOMBI2 vs Zombi2
    — it is already settled 61 to 0.** "ZOMBI2" appears 61 times in the manual, 136 in docs, 13 in web,
    10 in README; "Zombi2" appears **ZERO times anywhere**. It is also what CITATION.cff:3 and metadata.yaml:1
    already publish. There is nothing to decide unless you want to change it, which would touch 220+ user-facing
    strings for no gain. The real mess is v1: five forms are live (ZOMBI1 ×16, ZOMBI-1 ×3, ZOMBI 1 ×3,
    ZOMBI‑1 ×1 with a non-breaking hyphen, bare ZOMBI ×16). Adopt **ZOMBI 1**. **Reject "ZOMBI(1)"** —
    it appears zero times in the repo (it is a new proposal, not existing usage), and parentheses read
    as a citation marker that would collide with the @davin2020zombi refs sitting in the same sentences.
    One fact you may not have weighed: the published paper title is lowercase-after-Z — `docs/references.bib:12`
    reads "Zombi: a phylogenetic simulator of trees, genomes and sequences..." and the repo is github.com/AADavin/Zombi
    — so all-caps "ZOMBI" for v1 is a retcon of your own paper. That is why "Zombi" should survive inside
    citations and URLs. Two genuine bugs to fix in the same pass: `web/index.html:454` ("Running ZOMBI
    from the terminal") and `:476` ("Running ZOMBI in Python") are about ZOMBI2 and call it ZOMBI.'
  blocks:
  - CGLOBAL.1
  - C1.1
- id: D17
  slug: independent-conditioned-joint
  title: 'The core framing: independent / conditioned / joint + probability notation'
  question: How does the book explain how levels relate? Ratified in the 2026-07-17 discussion.
  severity: foundational
  scope: prose+figures
  status: decided
  decided_on: '2026-07-17'
  why_it_gates: This is the conceptual spine the whole book (esp. ch2 and the joint/nulls chapters) is
    taught on. It replaces the rejected 'factorisation breaks' framing and the driver/target/grammar/tier
    apparatus.
  options: []
  decision: 'THREE CATEGORIES describe how any TWO levels relate (not a whole run - each COUPLING is classified,
    a run can mix them): INDEPENDENT (no arrow between the two; two commands, any order; P(A|S)*P(B|S)),
    CONDITIONED (one-way arrow; two commands, order matters, second reads the first''s FILE; P(A|S)*P(B|S,A)),
    JOINT (cannot freeze either first; one command; P(A,B|S), or P(S,A) when the coupling reaches back
    into the tree and the TREE becomes an OUTPUT). Taught with PROBABILITY FACTORISATION notation P(.|.),
    which doubles as the licence to run separate commands: a factor you can sample once its bar is fixed
    = a command you can run. Key teaching points: (a) everything evolves ON the tree - the substrate arrows
    (Species->Trait, Species->Genome, Genome->Sequence) are ALWAYS there and never counted; a coupling
    is an OPTIONAL arrow ON TOP. (b) ''independent'' means independent OF EACH OTHER, not of the tree
    - state this once in ch2. (c) which side of the bar Species sits on = is the tree given or grown.
    (d) an arrow pointing back UP its own substrate is always joint. A coupling = a parameter that reads
    its value from another level instead of being typed. FIGURE ASSET built + approved: scratchpad composition.html
    (3-panel indep/cond/joint) + composition2.html (pipeline / BiSSE tree-as-output / mixed). Colours
    = house NODE_COL (Species teal #2f7d84, Trait sage #5f7d34, Genome terracotta #b5654a, Sequence violet
    #5a4e86); notation words coloured to match nodes; dashed=substrate, solid=coupling, capsule=grown
    together.'
