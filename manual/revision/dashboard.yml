- id: C14.13
  chapter: '14'
  kind: FQ
  verbatim: I know that some processes are bidirectional, but how is that integrated in the current framework
    driver->target:response?
  ask: Explain how a one-directional sentence expresses a bidirectional model.
  anchor: manual/chapters/14-coevolution-framework.md:77-81 ("switching **both** edges of a pair on together
    gives a **joint (bidirectional) model**")
  status: actionable
  difficulty: medium
  scope: prose+code
  cross_refs:
  - C14.18
  - C14.1
  - C14.7
  evidence: 'The honest answer, which the chapter never gives plainly: a bidirectional model is TWO couplings,
    and the framework detects that they form a cycle. In the design that is `grammar.py:432 is_fused`
    — two levels in one strongly-connected component of {coupling edges} ∪ {_SUBSTRATE_EDGES} must be
    co-integrated. On the CLI it is literally two flags: `--couple traits:genomes --couple genomes:traits`
    → `cli/coevolve.py:728 if eset == {"traits:genes", "genes:traits"}`. So the grammar CAN express it
    — the expressiveness hole he fears is not there. BUT there are two real caveats, and this is where
    his instinct is sound. (1) The pair is not the sum of its parts: the joint is a HAND-WRITTEN model,
    not a composition. `trait_gene_feedback.py:155-177 _evolve_branch` is a bespoke integrator that steps
    the OU trait and the gene panel in `steps=20` sub-pieces per branch. Nothing composes two `Coupling`
    objects into it. The docstring is candid (`trait_gene_feedback.py:19-21`): `effect_loss = 0` recovers
    pure `genes:traits`, `theta_high = theta_low` recovers pure `traits:genes` — the single edges are
    LIMITS of the joint, not the joint''s ingredients. So the direction of composition is backwards from
    what the framework advertises. (2) `CouplingGraph`, the thing that would make "two edges → fuse" automatic,
    is not wired in (`grammar.py:396-405`). The CLI hardcodes the three legal pairs.'
  recommendation: 'Answer it in one sentence in the text: "A bidirectional model is two couplings whose
    arrows form a cycle. Neither side can be frozen first, so both are integrated together." Then be honest
    about the caveat: the three joint models are each a single implementation, not two edges composed
    — because co-integrating a continuous diffusion with a jump process is not something you can assemble
    from two independent pieces. That honesty is worth more than the framework''s tidiness, and it is
    exactly the kind of thing that would make this a standard-setting manual. If C14.1 → Option A, this
    becomes the core of the one surviving "grown together" chapter.'
  outcome: null
  blocked_by:
  - D4
