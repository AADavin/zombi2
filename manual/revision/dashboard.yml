    \ `--couple traits:species` names two levels; which variable is bent and how is supplied by SEPARATE\
    \ flags (`--lambda0`/`--lambda1`/`--sse-model`, cli/coevolve.py:284-300). So the CLI does not express\
    \ the sentence even in principle. Third: `cli/coevolve.py:700-706` still normalises input `genomes`\
    \ DOWN to the internal `genes` token and warns on `genes` — the inverse of the ratified D1/C6 \"genomes\
    \ everywhere\", flagged as the outstanding P0 in docs/design/coevolve-grammar.md:557."
  recommendation: 'The cheapest fix that actually resolves it, and my recommendation: CHANGE THE SENTENCE,
    NOT THE CLI. Write the grammar as `driver → target.variable ⇒ response` (or `driver → target-variable
    [response]`), freeing `:` to mean one single thing everywhere — "→", the directed edge — which is
