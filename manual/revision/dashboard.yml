- id: C14.1
  chapter: '14'
  kind: FQ
  verbatim: All this COEVOLUTION part seems deeply confused to me. We really need to reconsider this.
    Is COEVOLUTION a... thing in iteslf? Should it be deeply rethought? This is a comment after having
    read the first two chapters of this part
  ask: Decide whether "Coevolution" is a real category deserving its own Part, or just the observation
    that some models read a driver from another level.
  anchor: manual/chapters/14-coevolution-framework.md:1 (\part{Coevolution}) — applies to chs 14–17
  status: needs-decision
  difficulty: epic
  scope: prose+code
  cross_refs:
  - C14.11
  - C14.13
  - C14.17
  - C14.18
  - C14.19
  - C14.20
  - Ch15 intro
  - Ch16 intro
  - Ch17 intro
  evidence: 'He is right, and the code is the strongest witness. (1) THE UNIFYING CLAIM IS FALSE FOR MOST
    EDGES. §14.1 line 20-22 says coevolution is where "the factorisation breaks: the levels must be grown
    together". But §14.4''s own table lists six edges, and the chapter itself says four of them (`species:traits`,
    `species:genomes`, `traits:genomes`, `genomes:traits`) are "overlays on a tree you supply" (line 102,
    137). An overlay factorises perfectly — it IS the §14.1 formula P(tree)·P(trait|tree)·P(genes|tree,trait),
    with the trait as a conditioning variable. So §14.1''s thesis contradicts §14.4''s table. Only 3 things
    genuinely fuse: `traits:species`, `genomes:species`, and the traits↔genomes loop. (2) THE CATEGORY
    IS NOT REALISED IN CODE. `zombi2/coevolve/` holds 12 modules that share no runtime machinery: `sse.py`
    is a forward Gillespie tree-grower; `trait_gene_feedback.py:155 _evolve_branch` is a bespoke OU+2-state
    co-integrator; `gene_conditioned_trait.py` is an Mk history + an OU walk on a given tree; `sequence_bridge.py:32
    DriverClock` is a `Clock` subclass plus a codon-model cache. The only shared thing is the `Response`
    vocabulary in `grammar.py`. (3) THE PIECE THAT WOULD MAKE IT ONE MECHANISM IS DEAD. `grammar.py:396-405`
    says in its own docstring: "**Not on the execution path yet — this solver is exercised only by its
    tests.** Nothing in ``zombi2/cli/`` or the bridges consults it". I verified: `grep -rn CouplingGraph
    --include=*.py` returns only `tests/`. The real CLI is `zombi2/cli/coevolve.py:723-766`, an `if eset
    == {...}` waterfall. So today "coevolution" = a directory + an adjective. (4) The three examples are
    genuinely unlike: SSE (a tree-growing Gillespie), trait→gene-loss (a rate modifier on an overlay),
    post-duplication ω relaxation (a per-gene-node codon-model lookup, and it does not even live on the
    `coevolve` command).'
  recommendation: 'Kill "Coevolution" as an organising idea; keep the models. The real distinction is
    CONDITIONED (the driver is already simulated, so it is just extra conditioning in the pipeline — 4
    of 6 edges + all 3 sequence edges) vs FUSED (a cycle in the dependency graph, so the levels must be
    co-integrated — into-S edges + the traits↔genomes loop). That distinction is a PROPERTY OF INDIVIDUAL
    MODELS, not a Part. My recommendation (Option A in `coevolution:exists`): each coupled model moves
    into the chapter of the level it TARGETS — SSE and key-innovation are diversification models (ch5);
    cladogenetic/gene-conditioned traits are trait models (ch11); trait-linked/punctuational genome are
    genome models (chs 6-7); the selection/speed couplings are sequence models (ch12, where they already
    live on the `sequences` command). What remains is ONE short chapter, "When two levels must be grown
    together", covering only the fused case and the nulls. That deletes the grammar, the diamond, the
    tiers, and the two rules in one stroke — every other complaint in this chapter dissolves. The cost
    is real and must be named: `zombi2 coevolve` is one command, and Option A would describe it across
    four chapters. That cost is itself evidence that the CODE is the thing that is wrong (see `coevolution:cli-home`).
    If that is too much for this revision, Option B: keep the Part, but respine it on conditioned-vs-fused,
    drop "the factorisation breaks" as the headline, and lead with one table of all nine edges.'
  outcome: null
  blocked_by:
  - D1
  - D4
