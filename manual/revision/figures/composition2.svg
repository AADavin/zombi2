<svg viewBox="0 0 1160 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Iowan Old Style, Palatino, Georgia, serif">
<title>Three more runs of increasing entanglement</title>
<desc>The classic pipeline (Species to Genomes to Sequences, no couplings); a trait driving speciation so the tree becomes an output; and a mixed run that is joint at the top and conditioned below.</desc>
<style>
  :root { --ink:#1a1a1a; --paper:#ffffff; --tint:#edeae3; }
  @media (prefers-color-scheme: dark) { :root { --ink:#e7ebe9; --paper:#191d20; --tint:#232a2c; } }
  .node{fill:var(--paper);stroke:var(--ink);stroke-width:1.5}
  .lbl{fill:var(--ink);font-size:14px;font-weight:600}
  .muted{fill:var(--ink);opacity:.6}
  .ttl{font-size:18px;font-weight:600;fill:var(--ink)}
  .note{font-size:13px;fill:var(--ink);opacity:.62;font-style:italic}
  .nota{font-size:12.5px;fill:var(--ink)}
  .subarrow{stroke:var(--ink);opacity:.5;stroke-width:1.9;stroke-dasharray:2 5;stroke-linecap:round;fill:none}
  .couple{stroke:var(--ink);stroke-width:2.6;fill:none;stroke-linecap:round}
  .capsule{fill:var(--tint);stroke:var(--ink);stroke-opacity:.45;stroke-width:1.4;stroke-dasharray:4 4}
</style>
<defs>
  <marker id="sh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="var(--ink)" opacity=".5"/></marker>
  <marker id="ih" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="var(--ink)"/></marker>
  <marker id="ihs" markerWidth="9" markerHeight="9" refX="1.5" refY="4.5" orient="auto"><path d="M8,0 L0,4.5 L8,9 z" fill="var(--ink)"/></marker>
</defs>

<text x="580" y="30" text-anchor="middle" class="muted" style="font-size:12px;letter-spacing:.14em">THREE MORE RUNS &#8212; INCREASING ENTANGLEMENT</text>

<!-- 1: the classic pipeline -->
<g transform="translate(200,0)">
  <text x="0" y="66" text-anchor="middle" class="ttl">The classic pipeline</text>
  <line class="subarrow" x1="0" y1="131" x2="0" y2="212" marker-end="url(#sh)"/>
  <line class="subarrow" x1="0" y1="256" x2="0" y2="337" marker-end="url(#sh)"/>
  <rect class="node" x="-54" y="90" width="108" height="42" rx="21"/><text x="0" y="111" text-anchor="middle" dominant-baseline="central" class="lbl">Species</text>
  <rect class="node" x="-54" y="214" width="108" height="42" rx="21"/><text x="0" y="235" text-anchor="middle" dominant-baseline="central" class="lbl">Genomes</text>
  <rect class="node" x="-54" y="338" width="108" height="42" rx="21"/><text x="0" y="359" text-anchor="middle" dominant-baseline="central" class="lbl">Sequences</text>
  <text x="0" y="440" text-anchor="middle" class="nota">P(Species) &#183; P(Genomes | Species) &#183; P(Sequences | Genomes)</text>
  <text x="0" y="468" text-anchor="middle" class="note">three commands, in order &#183; no couplings</text>
</g>

<!-- 2: BiSSE, the tree is an output -->
<g transform="translate(580,0)">
  <text x="0" y="66" text-anchor="middle" class="ttl">Traits drive speciation</text>
  <rect class="capsule" x="-95" y="116" width="190" height="180" rx="30"/>
  <line class="couple" x1="0" y1="164" x2="0" y2="248" marker-start="url(#ihs)" marker-end="url(#ih)"/>
  <rect class="node" x="-52" y="120" width="104" height="42" rx="21"/><text x="0" y="141" text-anchor="middle" dominant-baseline="central" class="lbl">Species</text>
  <rect class="node" x="-52" y="250" width="104" height="42" rx="21"/><text x="0" y="271" text-anchor="middle" dominant-baseline="central" class="lbl">Traits</text>
  <text x="0" y="440" text-anchor="middle" class="nota">P(Species, Traits)</text>
  <text x="0" y="468" text-anchor="middle" class="note">one command &#8212; the tree is grown, not given</text>
</g>

<!-- 3: mixed - joint on top, conditioned below -->
<g transform="translate(960,0)">
  <text x="0" y="66" text-anchor="middle" class="ttl">...and also drive gene loss</text>
  <rect class="capsule" x="-88" y="104" width="176" height="164" rx="28"/>
  <line class="couple" x1="0" y1="150" x2="0" y2="222" marker-start="url(#ihs)" marker-end="url(#ih)"/>
  <rect class="node" x="-52" y="108" width="104" height="42" rx="21"/><text x="0" y="129" text-anchor="middle" dominant-baseline="central" class="lbl">Species</text>
  <rect class="node" x="-52" y="224" width="104" height="42" rx="21"/><text x="0" y="245" text-anchor="middle" dominant-baseline="central" class="lbl">Traits</text>
  <line class="couple" x1="0" y1="270" x2="0" y2="345" marker-end="url(#ih)"/>
  <rect class="node" x="-52" y="347" width="104" height="42" rx="21"/><text x="0" y="368" text-anchor="middle" dominant-baseline="central" class="lbl">Genomes</text>
  <text x="0" y="446" text-anchor="middle" class="nota">P(Species, Traits) &#183; P(Genomes | Species, Traits)</text>
  <text x="0" y="474" text-anchor="middle" class="note">two commands: joint, then conditioned</text>
</g>

<line x1="196" y1="524" x2="230" y2="524" class="subarrow" marker-end="url(#sh)"/>
<text x="238" y="524" dominant-baseline="central" class="muted" style="font-size:12.5px">the tree (always there)</text>
<line x1="486" y1="524" x2="520" y2="524" class="couple" marker-end="url(#ih)"/>
<text x="528" y="524" dominant-baseline="central" class="muted" style="font-size:12.5px">a coupling you add</text>
<rect class="capsule" x="726" y="514" width="34" height="20" rx="10"/>
<text x="768" y="524" dominant-baseline="central" class="muted" style="font-size:12.5px">grown together &#8212; one command</text>
</svg>
